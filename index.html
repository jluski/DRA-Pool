function buildBoxes(ids, lad, randomize = false) {
  let rk = lad.filter(s => ids.includes(s.id)); if (randomize) rk = shuf(rk); const bx = []; let i = 0;
  while (i < rk.length) { const rem = rk.length - i;
    if (rem <= 6) { bx.push({ name: "Swing Box", isSwing: true, players: rk.slice(i).map(s => s.id) }); break; }
    bx.push({ name: "Box " + (bx.length + 1), isSwing: false, players: rk.slice(i, i + 4).map(s => s.id) }); i += 4; }
  if (bx.length && !bx[bx.length - 1].isSwing) { bx[bx.length - 1].isSwing = true; bx[bx.length - 1].name = "Swing Box"; }
  return bx;
}
function genBM(boxes) { const m = []; boxes.forEach((b, bi) => { for (let i = 0; i < b.players.length; i++) for (let j = i + 1; j < b.players.length; j++) m.push({ id: uid(), type: "box", box: bi, boxName: b.name, player1: b.players[i], player2: b.players[j], score1: null, score2: null, completed: false, completedAt: null }); }); return m; }
function genWC(boxes) {
  if (boxes.length < 2) return [];
  const wc = [], used = new Set();
  let all = boxes.flatMap((b, bi) => b.players.map(p => ({ id: p, box: bi })));
  if (all.length % 2 !== 0) {
    let removeIdx = -1;
    for (let i = all.length - 1; i >= 0; i--) { if (boxes[all[i].box] && boxes[all[i].box].isSwing) { removeIdx = i; break; } }
    if (removeIdx === -1) removeIdx = all.length - 1;
    all.splice(removeIdx, 1);
  }
  const sh = shuf(all);
  for (const p of sh) {
    if (used.has(p.id)) continue;
    const c = sh.find(x => x.box !== p.box && !used.has(x.id));
    if (!c) continue;
    used.add(p.id); used.add(c.id);
    wc.push({ id: uid(), type: "wildcard", player1: p.id, player2: c.id, score1: null, score2: null, completed: false, completedAt: null });
  }
  return wc;
}

function boxSt(pids, matches) {
  const s = {}; pids.forEach(id => { s[id] = { id, pts: 0, w: 0, l: 0, rw: 0, rl: 0 }; });
  matches.filter(m => m.completed).forEach(m => { if (!s[m.player1] || !s[m.player2]) return;
    if (m.forfeit || (m.score1 === 0 && m.score2 === 0)) return;
    s[m.player1].rw += m.score1; s[m.player1].rl += m.score2; s[m.player2].rw += m.score2; s[m.player2].rl += m.score1;
    if (m.score1 > m.score2) { s[m.player1].pts += m.score2 === 0 ? 5 : 4; s[m.player1].w++; s[m.player2].pts += m.score2 > 0 ? 2 : 0; s[m.player2].l++; }
    else { s[m.player2].pts += m.score1 === 0 ? 5 : 4; s[m.player2].w++; s[m.player1].pts += m.score1 > 0 ? 2 : 0; s[m.player1].l++; } });
  return Object.values(s).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    let aW = 0, bW = 0;
    matches.filter(m => m.completed && !m.forfeit && ((m.player1 === a.id && m.player2 === b.id) || (m.player1 === b.id && m.player2 === a.id))).forEach(m => { if ((m.player1 === a.id && m.score1 > m.score2) || (m.player2 === a.id && m.score2 > m.score1)) aW++; else bW++; });
    if (aW !== bW) return bW - aW;
    return b.w - a.w || b.rw - a.rw;
  });
}

function calcLad(players, st) {
  const s = {}; players.forEach(p => { s[p.id] = { id: p.id, name: p.name, points: 0, boxPts: 0, openPts: 0, wins: 0, losses: 0, rw: 0, rl: 0, mp: 0, last: p.joinedAt, inactive: false, streak: 0 }; });
  const all = [...(st.boxMatches || []), ...(st.wildCards || []), ...(st.openChallenges || [])];
  (st.pastCycles || []).forEach(c => { [...(c.boxMatches || []), ...(c.wildCards || []), ...(c.openChallenges || [])].forEach(m => all.push(m)); (c.bonuses || []).forEach(b => { if (s[b.id]) s[b.id].points += b.pts; }); });
  // Sort by completedAt for streak calc
  const sorted = all.filter(m => m.completed).sort((a, b) => (a.completedAt || "").localeCompare(b.completedAt || ""));
  sorted.forEach(m => {
    const a = s[m.player1], b = s[m.player2]; if (!a || !b) return;
    if (m.forfeit || (m.score1 === 0 && m.score2 === 0 && m.type !== "open")) return;
    a.mp++; b.mp++; a.rw += m.score1; a.rl += m.score2; b.rw += m.score2; b.rl += m.score1;
    if (m.completedAt) { if (m.completedAt > a.last) a.last = m.completedAt; if (m.completedAt > b.last) b.last = m.completedAt; }
    if (m.type === "open") {
      if (m.score1 > m.score2) { a.points += 2; a.openPts += 2; a.wins++; b.losses++; a.streak = a.streak > 0 ? a.streak + 1 : 1; b.streak = 0; }
      else { b.points += 2; b.openPts += 2; b.wins++; a.losses++; b.streak = b.streak > 0 ? b.streak + 1 : 1; a.streak = 0; }
    } else {
      const w1 = m.score1 > m.score2; const wp = w1 ? (m.score2 === 0 ? 5 : 4) : (m.score1 === 0 ? 5 : 4); const lp = w1 ? (m.score2 > 0 ? 2 : 0) : (m.score1 > 0 ? 2 : 0);
      if (w1) { a.points += wp; a.boxPts += wp; a.wins++; b.points += lp; b.boxPts += lp; b.losses++; a.streak = a.streak > 0 ? a.streak + 1 : 1; b.streak = 0; }
      else { b.points += wp; b.boxPts += wp; b.wins++; a.points += lp; a.boxPts += lp; a.losses++; b.streak = b.streak > 0 ? b.streak + 1 : 1; a.streak = 0; } }
  });
  if (st.boxes && st.boxMatches) { st.boxes.forEach((box, bi) => { const bm = st.boxMatches.filter(m => m.box === bi); if (bm.length > 0 && bm.every(m => m.completed)) { const bs = boxSt(box.players, bm); if (bs[0] && s[bs[0].id]) { s[bs[0].id].points += 3; s[bs[0].id].boxPts += 3; } if (bs[1] && s[bs[1].id]) { s[bs[1].id].points += 1; s[bs[1].id].boxPts += 1; } } }); }
  (st.pastCycles || []).forEach(c => { (c.bonuses || []).forEach(b => { if (s[b.id] && b.pts > 0) s[b.id].boxPts += b.pts; }); });
  const t = nw(); players.forEach(p => { if (s[p.id].last && dd(t, s[p.id].last) > 42) s[p.id].inactive = true; });
  return Object.values(s).sort((a, b) => { if (a.inactive !== b.inactive) return a.inactive ? 1 : -1; if (b.points !== a.points) return b.points - a.points; const h2h = getH2H(a.id, b.id, st); if (h2h && h2h.w1 !== h2h.w2) return h2h.w2 - h2h.w1; return b.wins - a.wins || b.rw - a.rw; });
}

// Head-to-head record between two players
function getH2H(p1, p2, st) {
  const all = [...(st.boxMatches || []), ...(st.wildCards || []), ...(st.openChallenges || [])];
  (st.pastCycles || []).forEach(c => { [...(c.boxMatches || []), ...(c.wildCards || []), ...(c.openChallenges || [])].forEach(m => all.push(m)); });
  let w1 = 0, w2 = 0;
  all.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)).forEach(m => {
    if (m.player1 === p1 && m.player2 === p2) { if (m.score1 > m.score2) w1++; else w2++; }
    else if (m.player1 === p2 && m.player2 === p1) { if (m.score1 > m.score2) w2++; else w1++; }
  });
  if (w1 === 0 && w2 === 0) return null;
  return { w1, w2 };
}

// ELO rating system — score-margin weighted, provisional K, per-match deltas
function calcElo(players, st) {
  const K_BOX = 32, K_WC = 24, K_OPEN = 16, K_PROV = 48, PROV = 8, BASE = 1000;
  const ratings = {}, played = {}, deltas = {};
  players.forEach(p => { ratings[p.id] = BASE; played[p.id] = 0; });
  const all = [];
  (st.pastCycles || []).forEach(c => {
    (c.boxMatches || []).forEach(m => all.push({ ...m, _k: K_BOX }));
    (c.wildCards || []).forEach(m => all.push({ ...m, _k: K_WC }));
    (c.openChallenges || []).forEach(m => all.push({ ...m, _k: K_OPEN }));
  });
  (st.boxMatches || []).forEach(m => all.push({ ...m, _k: K_BOX }));
  (st.wildCards || []).forEach(m => all.push({ ...m, _k: K_WC }));
  (st.openChallenges || []).forEach(m => all.push({ ...m, _k: K_OPEN }));
  all.filter(m => m.completed && !m.forfeit && (m.score1 + m.score2) > 0 && ratings[m.player1] !== undefined && ratings[m.player2] !== undefined)
    .sort((a, b) => (a.completedAt || "").localeCompare(b.completedAt || ""))
    .forEach(m => {
      const ra = ratings[m.player1], rb = ratings[m.player2];
      const tot = m.score1 + m.score2;
      const res1 = m.score1 / tot, res2 = m.score2 / tot;
      const ea = 1 / (1 + Math.pow(10, (rb - ra) / 400));
      const ka = played[m.player1] < PROV ? K_PROV : m._k;
      const kb = played[m.player2] < PROV ? K_PROV : m._k;
      const da = Math.round(ka * (res1 - ea));
      const db = Math.round(kb * (res2 - (1 - ea)));
      ratings[m.player1] += da; ratings[m.player2] += db;
      played[m.player1]++; played[m.player2]++;
      deltas[m.id] = { [m.player1]: da, [m.player2]: db };
    });
  return { ratings, deltas, played };
}

function getChampions(st, gn) {
  const champs = [];

        if (bs[0]) champs.push({ cycle: c.cycle, id: bs[0].id, name: gn(bs[0].id), date: c.startedAt });
      }

  });

  if (st.boxes && st.boxes.length > 0 && !st.boxes[0].isSwing) {

    }
  }
  return champs;
}

        const oppScore = isP1 ? m.score2 : m.score1;
        const oppId    = isP1 ? m.player2 : m.player1;
        const typeLabel = m.type === "wildcard" ? "Wild Card" : m.type === "open" ? "Open" : "Box";
        results.push({ id: m.id, oppName: gn(oppId), typeLabel, won: myScore > oppScore, myScore, oppScore, completedAt: m.completedAt || "", forfeit: !!m.forfeit });
      });
    };
    collect(st.boxMatches); collect(st.wildCards); collect(st.openChallenges);
    [...(st.pastCycles || [])].reverse().forEach(c => { collect(c.boxMatches); collect(c.wildCards); collect(c.openChallenges); });

    ? (lastCyc.boxes || []).map((box, bi) => { const bm = (lastCyc.boxMatches || []).filter(m => m.box === bi); const bs = boxSt(box.players, bm); return bs[0] ? { box: box.name, name: gn(bs[0].id), isSwing: box.isSwing } : null; }).filter(Boolean)
    : [];

  const totalDone = (st.boxMatches || []).filter(m => m.completed && !m.forfeit).length + (st.wildCards || []).filter(m => m.completed && !m.forfeit).length;
  const totalPend = (st.boxMatches || []).filter(m => !m.completed).length + (st.wildCards || []).filter(m => !m.completed).length;

  const historyRows = [...st.pastCycles].reverse().map(c => {
    const cChamps = (c.boxes || []).map((box, bi) => { const bm = (c.boxMatches || []).filter(m => m.box === bi); const bs = boxSt(box.players, bm); return bs[0] ? { box: box.name, name: gn(bs[0].id) } : null; }).filter(Boolean);
    if (!cChamps.length) return null;
    return (
      <div key={c.cycle} style={{ marginBottom: 10 }}>

      </div>

  return (
    <div>
      <header style={{ textAlign: "center", padding: "20px 0 12px" }}>
        <DRALogo />
        <p style={{ fontSize: 10, background: "linear-gradient(90deg," + P.orange + "," + P.amber + "," + P.blue + "," + P.orange + ")", backgroundSize: "300% 100%", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text", letterSpacing: 6, textTransform: "uppercase", marginTop: 8, fontWeight: 700, animation: "shimmer 4s linear infinite" }}>POOL LEAGUE</p>
        {st.cycleNumber > 0 && (
          <div style={{ ...gc, display: "inline-flex", gap: 16, marginTop: 10, padding: "6px 18px", borderRadius: 20, marginBottom: 0 }}>
            <span style={{ fontSize: 11, color: P.grey }}>Round {st.cycleNumber}</span>
            <span style={{ fontSize: 11, color: P.orange, fontWeight: 700 }}>{cd.d}d {cd.h}h {cd.m}m</span>

          </div>
        )}
      </header>

      {/* Cycle Progress — box-by-box summary */}
      {st.cycleNumber > 0 && boxSummaries.length > 0 && (
        <div style={{ ...gc, padding: "12px 16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <p style={{ fontSize: 9, color: P.blue, letterSpacing: 3, fontWeight: 700 }}>ROUND {st.cycleNumber} PROGRESS</p>
            <span style={{ fontSize: 10, color: P.dim }}>{totalDone} played · {totalPend} pending</span>
          </div>
          {boxSummaries.map(({ box, bi, done, total, bs, complete }) => (
            <div key={bi} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0", borderBottom: bi < boxSummaries.length - 1 ? "1px solid rgba(21,152,203,.08)" : "none" }}>
              <span style={{ fontSize: 9, fontWeight: 700, color: box.isSwing ? P.blue : P.orange, width: 52, letterSpacing: 1 }}>{box.name.toUpperCase()}</span>
              <span style={{ flex: 1, fontSize: 12, color: complete ? P.ok : P.off }}>
                {complete ? "\u2713 " + (bs[0] ? gn(bs[0].id) : "—") : done > 0 ? (bs[0] ? gn(bs[0].id) + " leads" : "—") : "No matches yet"}
              </span>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 48, height: 4, borderRadius: 2, background: "rgba(255,255,255,.1)", overflow: "hidden" }}>
                  <div style={{ width: total > 0 ? (done / total * 100) + "%" : "0%", height: "100%", background: complete ? P.ok : P.orange, borderRadius: 2, transition: "width .3s" }} />
                </div>
                <span style={{ fontSize: 9, color: P.dim, width: 22, textAlign: "right" }}>{done}/{total}</span>
              </div>
            </div>
          ))}

      )}

      {/* Last Round Champions */}
      {lastChamps.length > 0 && (
        lastCyc.randomized ? (
          <div style={{ ...gc, padding: "12px 16px", background: "linear-gradient(135deg, rgba(196,161,255,.1), rgba(21,152,203,.08))", borderColor: "rgba(196,161,255,.3)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <p style={{ fontSize: 9, color: P.wc, letterSpacing: 3, fontWeight: 700 }}>🎲 ROUND {lastCyc.cycle} · RANDOMIZED</p>
              {st.pastCycles.length > 1 && (
                <button onClick={() => setShowChampHistory(v => !v)} style={{ fontSize: 9, fontWeight: 700, padding: "3px 10px", borderRadius: 10, background: showChampHistory ? "rgba(196,161,255,.2)" : "transparent", border: "1px solid rgba(196,161,255,.4)", color: P.wc, cursor: "pointer" }}>
                  🎲 History {showChampHistory ? "▲" : "▼"}

            {lastChamps.map((w, i) => (

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <p style={{ fontSize: 9, color: P.orange, letterSpacing: 3, fontWeight: 700 }}>ROUND {lastCyc.cycle} CHAMPIONS</p>
              {st.pastCycles.length > 1 && (
                <button onClick={() => setShowChampHistory(v => !v)} style={{ fontSize: 9, fontWeight: 700, padding: "3px 10px", borderRadius: 10, background: showChampHistory ? "rgba(241,138,0,.2)" : "transparent", border: "1px solid rgba(241,138,0,.4)", color: P.amber, cursor: "pointer" }}>

                </button>
              )}
            </div>
            {lastChamps.map((w, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: i < lastChamps.length - 1 ? "1px solid rgba(21,152,203,.08)" : "none" }}>
                <span style={{ fontSize: 9, fontWeight: 700, color: w.isSwing ? P.blue : P.orange, width: 60 }}>{w.box}</span>
                <span style={{ flex: 1, fontSize: 13, color: P.white, fontWeight: 600, fontFamily: "Georgia,serif" }}>{"\ud83e\udd47"} {w.name}</span>
              </div>
            ))}
            {showChampHistory && <div style={{ marginTop: 12, borderTop: "1px solid rgba(21,152,203,.12)", paddingTop: 10 }}>{historyRows}</div>}
          </div>
        )
      )}

      {!st.cycleNumber && <div style={{ textAlign: "center", padding: "40px 0" }}><p style={{ fontSize: 44 }}>{"\ud83c\udfb1"}</p><p style={{ color: P.grey, marginTop: 10 }}>No active round yet.</p></div>}

      {st.cycleNumber > 0 && ladder.length > 0 && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Sub>STANDINGS</Sub>
            <button onClick={() => setActiveOnly(v => !v)} style={{ fontSize: 9, fontWeight: 700, padding: "3px 10px", borderRadius: 10, background: activeOnly ? P.orange : "transparent", border: "1px solid " + (activeOnly ? P.orange : P.dim), color: activeOnly ? P.navy : P.dim, cursor: "pointer", marginBottom: 8 }}>Active Only</button>
          </div>
          <div style={gt}>
            <div style={{ display: "flex", padding: "9px 10px", background: "rgba(0,48,82,.5)", gap: 4 }}>
              {[["#", 22], ["Player", 0], ["Tot", 28], ["Box", 28], ["Opn", 28], ["W", 22], ["L", 22]].map(([l, w]) => <span key={l + w} style={{ ...ths, width: w || undefined, flex: w ? undefined : 1 }}>{l}</span>)}
            </div>
            {displayLad.map((s, i) => (
              <div key={s.id}>
                <div onClick={() => setExp(exp === s.id ? null : s.id)} style={{ display: "flex", padding: "9px 10px", gap: 4, borderBottom: exp === s.id ? "none" : "1px solid rgba(21,152,203,.08)", background: i === 0 ? "rgba(241,138,0,.12)" : i % 2 === 0 ? "rgba(0,48,79,.2)" : "transparent", borderLeft: i === 0 ? "3px solid " + P.orange : "3px solid transparent", cursor: "pointer" }}>
                  <span style={{ width: 22, fontWeight: 700, fontSize: 12, color: i === 0 ? P.orange : i < 3 ? P.blue : P.dim }}>{i === 0 ? "\ud83d\udc51" : i + 1}</span>
                  <span style={{ flex: 1, fontWeight: i < 3 ? 600 : 400, fontSize: 12 }}>{s.name}<StreakBadge streak={s.streak} /></span>
                  <span style={{ width: 28, fontWeight: 700, color: P.orange, fontSize: 12 }}>{s.points}</span>
                  <span style={{ width: 28, color: P.amber, fontSize: 11 }}>{s.boxPts}</span>
                  <span style={{ width: 28, color: P.blue, fontSize: 11 }}>{s.openPts}</span>
                  <span style={{ width: 22, color: P.ok, fontSize: 11 }}>{s.wins}</span>
                  <span style={{ width: 22, color: P.bad, fontSize: 11 }}>{s.losses}</span>
                </div>
                {exp === s.id && (() => {
                  const elo = eloData.ratings[s.id] || 1000;
                  const prev = prevElo.ratings[s.id] || 1000;
                  const eloDelta = elo - prev;
                  const rank = eloRank[s.id] || "—";
                  const hist = getPlayerHistory(s.id);
                  return (
                    <div style={{ padding: "8px 12px 10px 12px", background: "rgba(0,20,40,.7)", borderBottom: "1px solid rgba(21,152,203,.08)", animation: "fadeIn .15s" }}>
                      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontSize: 11, color: P.grey }}>W/L: <span style={{ color: P.ok }}>{s.wins}</span>/<span style={{ color: P.bad }}>{s.losses}</span></span>
                        <span style={{ fontSize: 11, color: P.grey }}>Games: <span style={{ color: P.off }}>{s.rw}-{s.rl}</span></span>
                        <span style={{ fontSize: 11, color: P.grey }}>Played: <span style={{ color: P.off }}>{s.mp}</span></span>
                        <span style={{ fontSize: 11, color: P.grey }}>Last: <span style={{ color: P.off }}>{s.last ? new Date(s.last).toLocaleDateString() : "N/A"}</span></span>
                        {s.inactive && <span style={{ fontSize: 11, color: P.bad }}>Inactive</span>}
                      </div>
                      {(eloData.played[s.id] || 0) >= ELO_MIN ? (
                        <div style={{ marginBottom: 8 }}>
                          <span style={{ fontSize: 11, color: P.grey }}>ELO: <span style={{ color: P.blue, fontWeight: 700 }}>{elo}</span>{eloDelta !== 0 && <span style={{ color: eloDelta > 0 ? P.ok : P.bad }}> ({eloDelta > 0 ? "+" : ""}{eloDelta})</span>} <span style={{ color: P.dim }}>#{rank}</span></span>
                        </div>
                      ) : (
                        <div style={{ marginBottom: 8 }}>
                          <span style={{ fontSize: 11, color: P.dim }}>ELO unlocks after {ELO_MIN - (eloData.played[s.id] || 0)} more match{ELO_MIN - (eloData.played[s.id] || 0) !== 1 ? "es" : ""}</span>
                        </div>
                      )}
                      {!hist.length ? <p style={{ fontSize: 10, color: P.dim, fontStyle: "italic" }}>No match history.</p> : (
                        <div>
                          <p style={{ fontSize: 9, fontWeight: 700, color: P.blue, letterSpacing: 2, textTransform: "uppercase", marginBottom: 5 }}>Match History</p>
                          {hist.map(h => {
                            const d = eloData.deltas[h.id];
                            const eloDlt = d ? d[s.id] : null;
                            return (
                              <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 0", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
                                <span style={{ fontSize: 10, fontWeight: 700, color: h.forfeit ? P.dim : h.won ? P.ok : P.bad, width: 14, flexShrink: 0 }}>{h.forfeit ? "FF" : h.won ? "W" : "L"}</span>
                                <span style={{ fontSize: 11, color: P.off, width: 30, flexShrink: 0 }}>{h.forfeit ? "—" : h.myScore + "-" + h.oppScore}</span>
                                <span style={{ fontSize: 11, color: P.white, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>vs {h.oppName}</span>
                                <span style={{ fontSize: 9, fontWeight: 700, color: h.typeLabel === "Open" ? P.blue : h.typeLabel === "Wild Card" ? P.amber : P.orange, flexShrink: 0 }}>{h.typeLabel}</span>
                                {eloDlt !== null && !h.forfeit && <span style={{ fontSize: 9, fontWeight: 700, color: eloDlt > 0 ? P.ok : P.bad, flexShrink: 0, minWidth: 28, textAlign: "right" }}>{eloDlt > 0 ? "+" : ""}{eloDlt}</span>}
                                <span style={{ fontSize: 9, color: P.dim, flexShrink: 0 }}>{h.completedAt ? fmtDate(h.completedAt) : ""}</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 10 }}>
            {[[P.orange, "Total"], [P.amber, "Box"], [P.blue, "Open"], ["", "\ud83d\udd25 Streak"]].map(([c, t]) => <span key={t} style={{ fontSize: 9, color: P.grey, display: "flex", alignItems: "center", gap: 3 }}>{c && <span style={{ width: 6, height: 6, borderRadius: "50%", background: c }} />}{t}</span>)}
          </div>
        </div>
      )}

      {last5.length > 0 && <div style={{ marginTop: 12 }}><Sub>RECENT OPEN CHALLENGES</Sub><div style={{ ...gc, padding: 0, overflow: "hidden" }}>{last5.map(m => (<div key={m.id} style={{ display: "flex", alignItems: "center", padding: "8px 12px", borderBottom: "1px solid rgba(21,152,203,.06)" }}><span style={{ flex: 1, fontSize: 12, fontWeight: m.score1 > m.score2 ? 700 : 400, textAlign: "right", paddingRight: 8, color: m.score1 > m.score2 ? P.ok : P.off }}>{gn(m.player1)}</span><span style={{ fontSize: 13, fontWeight: 700, color: P.blue, width: 44, textAlign: "center" }}>{m.score1}-{m.score2}</span><span style={{ flex: 1, fontSize: 12, fontWeight: m.score2 > m.score1 ? 700 : 400, paddingLeft: 8, color: m.score2 > m.score1 ? P.ok : P.off }}>{gn(m.player2)}</span></div>))}</div></div>}

      <div style={{ textAlign: "center", padding: "20px 0 10px" }}>
        <button onClick={onJoin} style={{ padding: "14px 36px", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", border: "none", borderRadius: 14, color: P.navy, fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 20px rgba(241,138,0,.3)", marginBottom: 16 }}>
          🎱 Join the League
        </button>
        <div style={{ width: 40, height: 1, background: "linear-gradient(90deg,transparent," + P.orange + ",transparent)", margin: "0 auto 10px" }} />
        <p style={{ fontSize: 12, color: P.dim, fontStyle: "italic", fontFamily: "Georgia,serif", letterSpacing: 2 }}>DRAck 'Em Up</p>
      </div>
    </div>
  );
}

// ─── BOXES ───────────────────────────────────────────────────
function BoxesV({ st, gn, ini, logR, ffM }) {
  const [col, setCol] = useState({});
  const [activeMatchId, setActiveMatchId] = useState(null);
  const [s1, setS1] = useState(2); const [s2, setS2] = useState(0);
  const [ffConf, setFfConf] = useState(null);
  const valid = (s1 === 2 && s2 < 2) || (s2 === 2 && s1 < 2);
  const sub = (id, list) => { if (valid) { logR(id, s1, s2, list); setActiveMatchId(null); setS1(2); setS2(0); } };
  const openEntry = (id) => { setActiveMatchId(id); setS1(2); setS2(0); setFfConf(null); };
  const ScoreEntry = ({ m, list }) => (
    <div style={{ background: "rgba(0,20,40,.5)", borderRadius: 10, padding: "10px 12px", marginTop: 8, border: "1px solid rgba(21,152,203,.25)" }}>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        {[m.player1, m.player2].map((pid, pi) => {
          const cur = pi === 0 ? s1 : s2, set = pi === 0 ? setS1 : setS2, ov = pi === 0 ? s2 : s1, so = pi === 0 ? setS2 : setS1;
          return (
            <div key={pi} style={{ flex: 1, textAlign: "center" }}>
              <p style={{ fontSize: 11, color: P.grey, marginBottom: 6 }}>{gn(pid)}</p>
              <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                {[0, 1, 2].map(v => <button key={v} onClick={() => { set(v); if (v === 2 && ov === 2) so(1); }} style={{ width: 36, height: 36, borderRadius: 8, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700, background: cur === v ? "linear-gradient(135deg," + P.orange + "," + P.amber + ")" : "rgba(255,255,255,.08)", color: cur === v ? P.navy : P.off }}>{v}</button>)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <button onClick={() => sub(m.id, list)} disabled={!valid} style={{ flex: 1, padding: "8px 0", background: valid ? "linear-gradient(135deg," + P.orange + "," + P.amber + ")" : "rgba(255,255,255,.08)", border: "none", borderRadius: 8, color: valid ? P.navy : P.dim, fontWeight: 700, fontSize: 12, cursor: valid ? "pointer" : "default" }}>Confirm</button>
        <button onClick={() => setActiveMatchId(null)} style={{ padding: "8px 14px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 8, color: P.dim, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Cancel</button>
        {ffConf !== m.id
          ? <button onClick={() => setFfConf(m.id)} style={{ padding: "8px 14px", background: "transparent", border: "1px solid rgba(248,113,113,.4)", borderRadius: 8, color: P.bad, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Not played</button>
          : <button onClick={() => { ffM(m.id, list); setActiveMatchId(null); setFfConf(null); }} style={{ padding: "8px 14px", background: P.bad, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Confirm</button>}
      </div>
    </div>
  );
  if (!st.boxes || !st.boxes.length) return <div style={{ textAlign: "center", padding: 50 }}><p style={{ fontSize: 44 }}>{"\ud83d\udcca"}</p><p style={{ color: P.grey }}>No active round.</p></div>;
  const getS = (bm, p1, p2) => { const m = bm.find(m => (m.player1 === p1 && m.player2 === p2) || (m.player1 === p2 && m.player2 === p1)); if (!m) return null; if (!m.completed) return { pending: true, id: m.id }; return { s1: m.player1 === p1 ? m.score1 : m.score2, s2: m.player1 === p1 ? m.score2 : m.score1 }; };
  const togCol = (k) => setCol(c => ({ ...c, [k]: !c[k] }));
  return (
    <div style={{ paddingTop: 16 }}><Tt>Boxes — Round {st.cycleNumber}</Tt>
      {st.boxes.map((box, bi) => { const bm = st.boxMatches.filter(m => m.box === bi); const bs = boxSt(box.players, bm); const pids = bs.map(s => s.id); const done = bm.length > 0 && bm.every(m => m.completed); const isCol = col["box_" + bi];
        const activeM = activeMatchId ? (st.boxMatches || []).find(m => m.id === activeMatchId && m.box === bi) : null;
        return (
          <div key={bi} style={{ marginBottom: 16 }}>
            <div onClick={() => togCol("box_" + bi)} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, cursor: "pointer", userSelect: "none" }}>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: box.isSwing ? P.blue : P.orange }}>{box.name.toUpperCase()}</span>
              {done && <span style={{ fontSize: 8, color: P.ok, fontWeight: 700, background: "rgba(52,211,153,.1)", padding: "2px 8px", borderRadius: 10 }}>COMPLETE</span>}
              <span style={{ marginLeft: "auto", fontSize: 10, color: P.dim }}>{isCol ? "▶" : "▼"}</span>
            </div>
            {!isCol && <div style={{ ...gc, padding: 0, overflow: "hidden" }}><div style={{ overflowX: "auto" }}><table style={{ borderCollapse: "collapse", width: "100%", minWidth: pids.length * 50 + 130 }}>
              <thead><tr><th style={{ ...gth, textAlign: "left", minWidth: 80 }}>Player</th><th style={{ ...gth, width: 36 }}>Pts</th>{pids.map(id => <th key={id} style={{ ...gth, width: 46 }}>{ini(id)}</th>)}</tr></thead>
              <tbody>{pids.map((pid, ri) => (<tr key={pid}><td style={{ ...gtd, textAlign: "left", fontWeight: 600, fontSize: 12 }}>{gn(pid)}</td><td style={{ ...gtd, fontWeight: 700, color: P.orange }}>{bs[ri] ? bs[ri].pts : 0}</td>
                {pids.map(oid => { if (pid === oid) return <td key={oid} style={{ ...gtd, background: "rgba(0,48,82,.4)" }} />; const sc = getS(bm, pid, oid); if (!sc) return <td key={oid} style={{ ...gtd, color: P.dim }}>{"—"}</td>; if (sc.pending) return <td key={oid} onClick={() => openEntry(sc.id)} style={{ ...gtd, background: activeMatchId === sc.id ? "rgba(241,138,0,.3)" : "rgba(241,138,0,.12)", cursor: "pointer" }}><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: P.orange, animation: "pulse 1.8s infinite" }} /></td>; if (sc.s1 === 0 && sc.s2 === 0) return <td key={oid} style={{ ...gtd, color: P.dim, fontSize: 10, fontStyle: "italic" }}>FF</td>; const w = sc.s1 > sc.s2; return <td key={oid} style={{ ...gtd, fontWeight: 700, color: w ? P.ok : P.bad, background: w ? "rgba(52,211,153,.08)" : "rgba(248,113,113,.06)" }}>{sc.s1}-{sc.s2}</td>; })}
              </tr>))}</tbody></table></div>
              {activeM && <div style={{ padding: "0 8px 8px" }}><ScoreEntry m={activeM} list="boxMatches" /></div>}
            </div>}
            {!isCol && done && <div style={{ display: "flex", gap: 12, marginTop: 6 }}><span style={{ fontSize: 10, color: P.orange }}>{"\ud83e\udd47"} {gn(bs[0] ? bs[0].id : "")} (+3)</span>{bs[1] && <span style={{ fontSize: 10, color: P.grey }}>{"\ud83e\udd48"} {gn(bs[1].id)} (+1)</span>}</div>}
          </div>); })}
      {st.wildCards && st.wildCards.length > 0 && (
        <div>

// ─── MATCHES (with H2H) ─────────────────────────────────────
function MatchesV({ st, gn, logR, ffM }) {
  const [sc, setSc] = useState(null); const [s1, setS1] = useState(2); const [s2, setS2] = useState(0); const [ffConf, setFfConf] = useState(null);
  const [filterPlayer, setFilterPlayer] = useState(null);

  const valid = (s1 === 2 && s2 < 2) || (s2 === 2 && s1 < 2);
  const sub = (id, list) => { if (valid) { logR(id, s1, s2, list); setSc(null); setS1(2); setS2(0); } };
  const rm = (m, list, label, color) => {
    const h2h = getH2H(m.player1, m.player2, st);
    return (
    <div key={m.id} style={{ ...gc, opacity: m.completed && sc !== m.id ? .5 : 1 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>

        {h2h && <span style={{ fontSize: 9, color: P.dim }}>H2H: {gn(m.player1).split(" ")[0]} {h2h.w1}-{h2h.w2} {gn(m.player2).split(" ")[0]}</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ flex: 1, fontSize: 14, fontWeight: 600 }}>{gn(m.player1)}</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: m.completed ? (m.forfeit ? P.dim : P.orange) : P.dim, padding: "0 10px" }}>{m.completed ? (m.forfeit ? "—" : m.score1 + " – " + m.score2) : "vs"}</span>
        <span style={{ flex: 1, fontSize: 14, fontWeight: 600, textAlign: "right" }}>{gn(m.player2)}</span>
      </div>
      {m.completed && m.forfeit && <div style={{ fontSize: 11, color: P.dim, marginTop: 5, fontStyle: "italic" }}>Not played</div>}
      {m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0) && <div style={{ fontSize: 11, color: P.ok, marginTop: 5 }}>{m.score1 > m.score2 ? gn(m.player1) : gn(m.player2)} wins</div>}
      {m.completed && sc !== m.id && <button onClick={() => { setSc(m.id); setS1(m.score1 ?? 2); setS2(m.score2 ?? 0); }} style={{ marginTop: 6, padding: "5px 12px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 8, color: P.dim, fontWeight: 600, fontSize: 10, cursor: "pointer" }}>Edit Score</button>}
      {!m.completed && sc !== m.id && ffConf !== m.id && <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <button onClick={() => { setSc(m.id); setS1(2); setS2(0); }} style={{ ...bpS, width: "auto", display: "inline-block", padding: "8px 18px", marginTop: 0 }}>Log Score</button>
        <button onClick={() => setFfConf(m.id)} style={{ padding: "8px 18px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 10, color: P.dim, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Forfeit</button>
      </div>}
      {ffConf === m.id && <div style={{ marginTop: 10, padding: "10px 12px", background: "rgba(248,113,113,.08)", border: "1px solid rgba(248,113,113,.3)", borderRadius: 10 }}>
        <p style={{ fontSize: 11, color: P.bad, marginBottom: 8 }}>Mark {gn(m.player1)} vs {gn(m.player2)} as not played?</p>
        <div style={{ display: "flex", gap: 8 }}><button onClick={() => { ffM(m.id, list); setFfConf(null); }} style={{ ...bpS, marginTop: 0, background: P.bad, padding: "6px 16px", fontSize: 11 }}>Confirm</button><button onClick={() => setFfConf(null)} style={bcS}>Cancel</button></div>
      </div>}
      {sc === m.id && <div style={{ marginTop: 12, padding: 14, background: "rgba(0,20,40,.6)", borderRadius: 12, border: "1px solid " + P.gb }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
          {["player1", "player2"].map((k, idx) => { const val = idx === 0 ? s1 : s2, sv = idx === 0 ? setS1 : setS2, ov = idx === 0 ? s2 : s1, so = idx === 0 ? setS2 : setS1; return (
            <div key={k} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: P.grey }}>{gn(m[k])}</span>
              <div style={{ display: "flex", gap: 4 }}>{[0, 1, 2].map(v => <button key={v} onClick={() => { sv(v); if (v === 2 && ov === 2) so(1); }} style={{ width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 10, background: val === v ? "linear-gradient(135deg," + P.orange + "," + P.amber + ")" : P.glass, border: "1px solid " + (val === v ? P.orange : P.gb), color: val === v ? P.navy : P.grey, fontSize: 16, fontWeight: 700, cursor: "pointer", transform: val === v ? "scale(1.08)" : "scale(1)" }}>{v}</button>)}</div>
            </div>); })}
        </div>
        {valid ? <button onClick={() => sub(m.id, list)} style={bpS}>Confirm {s1} – {s2}</button> : <p style={{ fontSize: 10, color: P.dim, textAlign: "center", marginTop: 8 }}>One player must win 2</p>}
        <button onClick={() => setSc(null)} style={bcS}>Cancel</button>
      </div>}
    </div>);
  };
  const [col, setCol] = useState({ done: true });
  const togCol = (k) => setCol(c => ({ ...c, [k]: !c[k] }));
  const SecHdr = ({ k, label }) => (
    <div onClick={() => togCol(k)} style={{ display: "flex", alignItems: "center", cursor: "pointer", userSelect: "none", margin: "18px 0 8px" }}>
      <span style={{ fontSize: 9, fontWeight: 700, color: P.orange, letterSpacing: 3, textTransform: "uppercase" }}>{label}</span>
      <span style={{ marginLeft: 8, fontSize: 10, color: P.dim }}>{col[k] ? "▶" : "▼"}</span>
    </div>

  const wP = (st.wildCards || []).filter(m => !m.completed), wD = (st.wildCards || []).filter(m => m.completed);
  const oP = (st.openChallenges || []).filter(m => !m.completed), oD = (st.openChallenges || []).filter(m => m.completed);
  const allPend = [...bP, ...wP, ...oP];
  const pendPIds = [...new Set(allPend.flatMap(m => [m.player1, m.player2]))];
  const pendPlayers = pendPIds.map(id => ({ id, name: gn(id) })).sort((a, b) => a.name.localeCompare(b.name));
  const showM = (m) => !filterPlayer || m.player1 === filterPlayer || m.player2 === filterPlayer;
  const fbP = bP.filter(showM), fbD = bD.filter(showM);
  const fwP = wP.filter(showM), fwD = wD.filter(showM);
  const foP = oP.filter(showM), foD = oD.filter(showM);
  return (<div style={{ paddingTop: 16 }}><Tt>Round {st.cycleNumber} Matches</Tt>
    {pendPlayers.length > 0 && (
      <select value={filterPlayer || ""} onChange={e => setFilterPlayer(e.target.value || null)} style={{ width: "100%", background: "rgba(0,20,40,.6)", border: "1px solid rgba(21,152,203,.3)", borderRadius: 10, color: filterPlayer ? P.off : P.dim, fontSize: 13, padding: "10px 14px", marginBottom: 12, appearance: "none", WebkitAppearance: "none", cursor: "pointer" }}>
        <option value="">All pending matches</option>
        {pendPlayers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
      </select>
    )}
    {fbP.length > 0 && <div><SecHdr k="bp" label={"Box — Pending (" + fbP.length + ")"} />{!col["bp"] && fbP.map(m => rm(m, "boxMatches", "BOX", P.orange))}</div>}
    {fwP.length > 0 && <div><SecHdr k="wp" label={"Wild Cards — Pending (" + fwP.length + ")"} />{!col["wp"] && fwP.map(m => rm(m, "wildCards", "WILD CARD", P.wc))}</div>}
    {foP.length > 0 && <div><SecHdr k="op" label={"Open — Pending (" + foP.length + ")"} />{!col["op"] && foP.map(m => rm(m, "openChallenges", "OPEN", P.blue))}</div>}
    {(fbD.length + fwD.length + foD.length > 0) && <div><SecHdr k="done" label={"Completed (" + (fbD.length + fwD.length + foD.length) + ")"} />{!col["done"] && <div>{fbD.map(m => rm(m, "boxMatches", "BOX", P.orange))}{fwD.map(m => rm(m, "wildCards", "WILD CARD", P.wc))}{foD.map(m => rm(m, "openChallenges", "OPEN", P.blue))}</div>}</div>}
  </div>);
}

// ─── CHECK IN ───────────────────────────────────────────────
function CheckInV({ st, ladder, togCI, autoOpen, onAutoOpenDone }) {
  const [search, setSearch] = useState("");
  const [showSignUp, setShowSignUp] = useState(true);
  const [showRemaining, setShowRemaining] = useState(false);
  const [confirmJoinId, setConfirmJoinId] = useState(null);
  const signupRef = React.useRef(null);
  React.useEffect(() => {
    if (!autoOpen) return;
    setShowSignUp(true);
    setShowRemaining(true);
    setTimeout(() => { signupRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }); }, 150);
    if (onAutoOpenDone) onAutoOpenDone();
  }, [autoOpen]);
  // Playing This Round — players in the current active round
  const currentIds = new Set((st.boxes || []).flatMap(b => b.players));
  const currentPlayers = ladder.filter(s => currentIds.has(s.id));

  // Sign Up for Next Round
  const playing = ladder.filter(s => st.checkedIn.includes(s.id));
  const notPlaying = ladder.filter(s => !st.checkedIn.includes(s.id));
  const boxWcIds = new Set([...(st.boxMatches || []), ...(st.wildCards || [])].filter(m => m.completed && !m.forfeit).flatMap(m => [m.player1, m.player2]));
  const allCurrentIds = new Set([...(st.boxMatches || []), ...(st.wildCards || []), ...(st.openChallenges || [])].filter(m => m.completed && !m.forfeit).flatMap(m => [m.player1, m.player2]));
  const returning = playing.filter(s => boxWcIds.has(s.id));
  const newPlayers = playing.filter(s => !boxWcIds.has(s.id) && !allCurrentIds.has(s.id));
  const other = playing.filter(s => allCurrentIds.has(s.id) && !boxWcIds.has(s.id));
  const filtered = search.trim() ? notPlaying.filter(s => s.name.toLowerCase().includes(search.toLowerCase())) : notPlaying;

  const secBtn = (label, show, onToggle, count) => (
    <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0 6px", cursor: "pointer", userSelect: "none" }}>
      <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 2, color: P.dim }}>{show ? "\u25bc" : "\u25b6"}</span>
      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: P.dim, textTransform: "uppercase" }}>{label}</span>
      {count !== undefined && <span style={{ fontSize: 10, color: P.grey }}>({count})</span>}
      <div style={{ flex: 1, height: 1, background: P.gb }} />
    </div>
  );

  const playerRow = (s, action, actionLabel, actionStyle, badge) => (
    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
      {badge && <span style={{ fontSize: 8, fontWeight: 700, color: badge === "NEW" ? P.orange : P.ok, background: badge === "NEW" ? "rgba(241,138,0,.15)" : "rgba(52,211,153,.12)", border: badge === "NEW" ? "1px solid rgba(241,138,0,.3)" : "1px solid rgba(52,211,153,.35)", borderRadius: 4, padding: "1px 5px", letterSpacing: 1 }}>{badge}</span>}
      <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
      {action && <button onClick={() => action(s.id)} style={actionStyle}>{actionLabel}</button>}
    </div>
  );

  const leaveBtn = { padding: "4px 12px", background: "transparent", border: "1px solid " + P.bad, borderRadius: 8, color: P.bad, fontSize: 10, fontWeight: 700, cursor: "pointer" };
  const joinBtn = { padding: "4px 12px", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", border: "none", borderRadius: 8, color: P.navy, fontSize: 10, fontWeight: 700, cursor: "pointer" };

  return (<div style={{ paddingTop: 16 }}>
    {confirmJoinId !== null && (
      <div style={{ position: "fixed", inset: 0, zIndex: 50, background: "rgba(0,10,20,.85)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ ...gc, maxWidth: 320, width: "100%", textAlign: "center" }}>
          <p style={{ fontSize: 16, fontWeight: 700, color: P.white, marginBottom: 8 }}>Join the League?</p>
          <p style={{ fontSize: 13, color: P.grey, marginBottom: 20 }}>{(st.players.find(p => p.id === confirmJoinId) || {}).name || "This player"} will be signed up for the next round.</p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { togCI(confirmJoinId); setConfirmJoinId(null); }} style={{ flex: 1, padding: "12px 0", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", border: "none", borderRadius: 12, color: P.navy, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Yes, I'm in!</button>
            <button onClick={() => setConfirmJoinId(null)} style={{ flex: 1, padding: "12px 0", background: "transparent", border: "1px solid " + P.dim, borderRadius: 12, color: P.grey, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>No</button>
          </div>
        </div>
      </div>
    )}
    <Tt>Players</Tt>
    <p style={{ fontSize: 12, color: P.grey, marginBottom: 10 }}>{st.checkedIn.length} of {st.players.length} Signed up for next round</p>

    {/* Playing This Round — read-only */}
    {st.cycleNumber > 0 && currentPlayers.length > 0 && (<>
      {secBtn("Playing This Round", true, () => {}, currentPlayers.length)}
      <div style={gc}>
        {currentPlayers.map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
            <span style={{ fontSize: 9, color: P.dim }}>active</span>
          </div>
        ))}
      </div>
    </>)}

    {/* Sign Up for Next Round */}
    {secBtn("Sign Up for Next Round", showSignUp, () => setShowSignUp(v => !v), playing.length)}
    {showSignUp && (
      <div style={gc}>
        {playing.length === 0 && <p style={{ fontSize: 12, color: P.dim, textAlign: "center", padding: "8px 0" }}>No one signed up yet.</p>}
        {returning.map(s => playerRow(s, togCI, "Leave", leaveBtn, "RETURNING"))}
        {newPlayers.map(s => playerRow(s, togCI, "Leave", leaveBtn, "NEW"))}
        {other.map(s => playerRow(s, togCI, "Leave", leaveBtn, null))}

        {/* Remaining — collapsed */}
        <div ref={signupRef} onClick={() => setShowRemaining(v => !v)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0 6px", cursor: "pointer", userSelect: "none", marginTop: 4, borderTop: "1px solid rgba(21,152,203,.08)" }}>
          <span style={{ fontSize: 9, color: P.dim }}>{showRemaining ? "\u25bc" : "\u25b6"}</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: P.dim, letterSpacing: 1 }}>NOT SIGNED UP ({notPlaying.length})</span>
        </div>
        {showRemaining && (<>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ ...inpS, width: "100%", marginBottom: 8, flex: "none", fontSize: 12 }} />
          {filtered.map(s => playerRow(s, id => setConfirmJoinId(id), "Join", joinBtn, false))}
          {filtered.length === 0 && search && <p style={{ color: P.dim, fontSize: 12, padding: "8px 0", textAlign: "center" }}>No matches for "{search}"</p>}
          {filtered.length === 0 && !search && <p style={{ fontSize: 12, color: P.dim, textAlign: "center", padding: "8px 0" }}>Everyone is already signed up!</p>}
        </>)}
      </div>
    )}
  </div>);
}

// ─── RULES & SCORING ─────────────────────────────────────────

    ["5. Playing Out of the Kitchen & Scratches", "When the cue ball is behind the break line, your first hit must contact a ball or rail outside the kitchen. Any scratch (cue ball into a pocket) — whether playing out of the kitchen or during normal play — results in ball-in-hand behind the kitchen line only. Your opponent must place the cue ball behind the break line before shooting."],

    ["9. Eight-Ball Rules", "The 8-ball must be called, but you don't have to call the shot type. The 8-ball cannot be used in a combo. Hitting an opponent's ball first while shooting the 8 = loss of turn. Scratching or jumping the cue ball while shooting the 8 = loss of game."],

            <Row title="Respect the environment" body="This is a work environment — respect people's time and calendars. Close the doors if matches take place during office hours." />
            <Row title="No coaching" body="Don't coach or comment during another player's shot. No slamming cues, trash talk, or excessive celebrations." />
            <Row title="Log scores immediately" body="Scores must be logged in the app immediately after the match. Completed scores can be corrected via the Matches tab." />
            <Row title="Disputes" body="If a situation isn't covered, default to the DRA House &quot;Bar&quot; Rules. Universal rule: if there's a dispute — replay the shot. No exceptions." last />
          </Section>
          <Section title="League Format">
            <Row title="Box Structure" body="Players are grouped into boxes of up to 4. Full round-robin within each box — 3 matches per round. New/returning players start in the Swing Box." />
            <Row title="Promotion & Relegation" body="Boxes are re-seeded each round based on ladder rank — the top-ranked players form Box 1, working down to the Swing Box. Win matches and earn points to climb the standings and earn a spot in a higher box next round. New players start in the Swing Box." />
            <Row title="Wild Cards" body="Each player gets 1 wild card cross-box match per round, randomly assigned." />
            <Row title="Open Challenges" body="Open Challenges are unlimited — challenge anyone in the office for 2 bonus points. No penalty for a loss." />
            <Row title="Inactivity" body="No match in 42 days → marked inactive and dropped to the bottom of the standings." last />
          </Section>
          <Section title="DRA House Bar Rules" color={P.blue}>
            {houseRules.map(([title, body], i) => (
              <Row key={title} title={title} body={body} last={i === houseRules.length - 1} />
            ))}
          </Section>
          <div style={{ ...gc, background: "rgba(241,138,0,.08)", border: "1px solid rgba(241,138,0,.25)", textAlign: "center" }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: P.orange }}>Good shots. Good vibes. 🎱</p>
          </div>
        </div>
      )}

      {tab === "scoring" && (
        <div>
          <Section title="Match Points">
            <p style={{ fontSize: 11, color: P.dim, marginBottom: 12 }}>Applies to box matches and wild card matches. Best of 3 games (race to 2).</p>
            <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,.1)" }}>
              {[
                ["Win 2–0", "Shutout — opponent scores 0 games", "5 pts", P.orange],
                ["Win 2–1", "Win with opponent scoring 1 game", "4 pts", P.amber],
                ["Loss 1–2", "Lose but score 1 game", "2 pts", P.blue],
                ["Loss 0–2", "Lose without scoring", "0 pts", P.bad],
              ].map(([result, desc, pts, color], i) => (
                <div key={result} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: i % 2 === 0 ? "rgba(0,48,82,.4)" : "transparent", borderBottom: i < 3 ? "1px solid rgba(255,255,255,.05)" : "none" }}>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 13, fontWeight: 700, color: P.off, marginBottom: 2 }}>{result}</p>
                    <p style={{ fontSize: 10, color: P.dim }}>{desc}</p>
                  </div>
                  <span style={{ fontSize: 20, fontWeight: 700, color, minWidth: 48, textAlign: "right" }}>{pts}</span>
                </div>
              ))}
            </div>
            <p style={{ fontSize: 10, color: P.dim, marginTop: 8 }}>Tiebreaker: head-to-head record, then total wins, then total racks won.</p>
          </Section>
          <Section title="End-of-Round Bonuses">
            <p style={{ fontSize: 11, color: P.dim, marginBottom: 12 }}>Awarded automatically when all matches in a box are complete.</p>
            <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,.1)" }}>
              {[
                ["Box 1st Place", "Finish 1st in your box — Round Champion 🏆", "+3 pts", P.orange],
                ["Box 2nd Place", "Finish 2nd in your box", "+1 pt", P.grey],
              ].map(([result, desc, pts, color], i) => (
                <div key={result} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: i % 2 === 0 ? "rgba(0,48,82,.4)" : "transparent", borderBottom: i < 1 ? "1px solid rgba(255,255,255,.05)" : "none" }}>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 13, fontWeight: 700, color: P.off, marginBottom: 2 }}>{result}</p>
                    <p style={{ fontSize: 10, color: P.dim }}>{desc}</p>
                  </div>
                  <span style={{ fontSize: 20, fontWeight: 700, color, minWidth: 48, textAlign: "right" }}>{pts}</span>
                </div>
              ))}
            </div>
          </Section>
          <Section title="Open Challenges">
            <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,.1)" }}>
              {[
                ["Win", "Defeat any opponent in an open challenge", "+2 pts", P.blue],
                ["Loss", "Open challenge loss — no penalty", "0 pts", P.dim],
              ].map(([result, desc, pts, color], i) => (
                <div key={result} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: i % 2 === 0 ? "rgba(0,48,82,.4)" : "transparent", borderBottom: i < 1 ? "1px solid rgba(255,255,255,.05)" : "none" }}>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 13, fontWeight: 700, color: P.off, marginBottom: 2 }}>{result}</p>
                    <p style={{ fontSize: 10, color: P.dim }}>{desc}</p>
                  </div>
                  <span style={{ fontSize: 20, fontWeight: 700, color, minWidth: 48, textAlign: "right" }}>{pts}</span>
                </div>
              ))}
            </div>
          </Section>
          <div style={{ ...gc, background: "rgba(21,152,203,.06)", border: "1px solid rgba(21,152,203,.2)" }}>
            <h4 style={{ fontSize: 13, fontWeight: 700, color: P.blue, marginBottom: 10 }}>Best Possible Round</h4>
            <p style={{ fontSize: 12, color: P.grey, lineHeight: 1.8 }}>
              3× shutout box wins (3 × 5) → <span style={{ color: P.orange, fontWeight: 700 }}>15 pts</span><br />
              Box winner bonus → <span style={{ color: P.orange, fontWeight: 700 }}>+3 pts</span><br />
              Wild card shutout win → <span style={{ color: P.orange, fontWeight: 700 }}>+5 pts</span><br />
              <span style={{ color: P.off, fontWeight: 700, fontSize: 13 }}>Box/WC total: 23 pts</span><br />
              <span style={{ color: P.blue, fontSize: 11 }}>+ Open challenges: +2 pts each (unlimited)</span>
            </p>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADMIN ───────────────────────────────────────────────────
function PastCycleRow({ c, gn, cycleIdx, saveCycle }) {
  const [open, setOpen] = useState(false);
  const [tab, setTab] = useState("standings");
  const [editMode, setEditMode] = useState(false);
  const [editConfirm, setEditConfirm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [eS1, setES1] = useState(0);
  const [eS2, setES2] = useState(0);

  const realBM = (c.boxMatches || []).filter(m => m.completed && !m.forfeit);
  const realWC = (c.wildCards || []).filter(m => m.completed && !m.forfeit);
  const realOC = (c.openChallenges || []).filter(m => m.completed && !m.forfeit);
  const unplayed = (c.boxMatches || []).filter(m => m.forfeit).length + (c.wildCards || []).filter(m => m.forfeit).length;
  const totalMatches = (c.boxMatches || []).length + (c.wildCards || []).length;
  const totalReal = realBM.length + realWC.length + realOC.length;
  const pct = totalMatches > 0 ? Math.round((totalReal / totalMatches) * 100) : 100;

  // Champions per box
  const champions = (c.boxes || []).map((box, bi) => {
    const bs = boxSt(box.players, (c.boxMatches || []).filter(m => m.box === bi));
    return { boxName: box.name, isSwing: box.isSwing, winner: bs[0]?.id, runner: bs[1]?.id };
  });

  // Per-player cycle totals for Players tab
  const pTotals = {};
  const ensureP = id => { if (!pTotals[id]) pTotals[id] = { id, matchPts: 0, bonusPts: 0 }; };
  [...realBM, ...realWC].forEach(m => {
    ensureP(m.player1); ensureP(m.player2);
    if (m.score1 > m.score2) { pTotals[m.player1].matchPts += m.score2 === 0 ? 5 : 4; if (m.score2 > 0) pTotals[m.player2].matchPts += 2; }
    else { pTotals[m.player2].matchPts += m.score1 === 0 ? 5 : 4; if (m.score1 > 0) pTotals[m.player1].matchPts += 2; }
  });
  realOC.forEach(m => {
    ensureP(m.player1); ensureP(m.player2);
    if (m.score1 > m.score2) pTotals[m.player1].matchPts += 2; else pTotals[m.player2].matchPts += 2;
  });
  (c.bonuses || []).forEach(b => { ensureP(b.id); pTotals[b.id].bonusPts += b.pts; });
  const playerList = Object.values(pTotals).map(p => ({ ...p, total: p.matchPts + p.bonusPts })).sort((a, b) => b.total - a.total);

  const allMatches = [
    ...realBM.map(m => ({ ...m, _type: "Box", _label: m.boxName || "Box" })),
    ...realWC.map(m => ({ ...m, _type: "WC", _label: "Wild Card" })),
    ...realOC.map(m => ({ ...m, _type: "Open", _label: "Open" })),
  ].sort((a, b) => (a.completedAt || "").localeCompare(b.completedAt || ""));

  const saveMatchEdit = (matchId, s1, s2) => {
    const upd = list => list.map(m => m.id === matchId ? { ...m, score1: s1, score2: s2, forfeit: false } : m);
    saveCycle(cycleIdx, { ...c, boxMatches: upd(c.boxMatches || []), wildCards: upd(c.wildCards || []), openChallenges: upd(c.openChallenges || []) });
    setEditingId(null);
  };

  const saveBonusEdit = (playerId, newPts) => {
    saveCycle(cycleIdx, { ...c, bonuses: (c.bonuses || []).map(b => b.id === playerId ? { ...b, pts: +newPts } : b) });
  };

  const tabBtn = (t, label) => (
    <button key={t} onClick={() => setTab(t)} style={{ padding: "5px 12px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700, background: tab === t ? P.orange : "rgba(21,152,203,.12)", color: tab === t ? "#000" : P.dim }}>{label}</button>
  );

  return (
    <div style={{ borderBottom: "1px solid rgba(21,152,203,.08)", paddingBottom: open ? 14 : 0, marginBottom: 8 }}>
      <div onClick={() => setOpen(v => !v)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0", cursor: "pointer", userSelect: "none" }}>
        <div>
          <span style={{ fontWeight: 700, color: P.orange, fontSize: 14 }}>Round {c.cycle}</span>
          <span style={{ fontSize: 10, color: P.dim, marginLeft: 8 }}>{fmtDate(c.startedAt)}</span>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 10, color: P.dim }}>{totalReal}/{totalMatches} · {pct}%</span>
          {unplayed > 0 && <span style={{ fontSize: 10, color: P.bad }}>{unplayed} N/P</span>}
          <span style={{ fontSize: 10, color: P.dim }}>{open ? "▼" : "▶"}</span>
        </div>
      </div>

      {open && (
        <div>
          {/* Champions callout */}
          <div style={{ background: "rgba(255,184,0,.06)", border: "1px solid rgba(255,184,0,.15)", borderRadius: 10, padding: "10px 12px", marginBottom: 12 }}>
            <p style={{ fontSize: 9, color: P.amber, fontWeight: 700, letterSpacing: 2, marginBottom: 8 }}>ROUND CHAMPIONS</p>
            {champions.map((ch, i) => ch.winner && (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                <span style={{ fontSize: 9, color: ch.isSwing ? P.blue : P.dim, fontWeight: 700, width: 62, letterSpacing: 1, flexShrink: 0 }}>{ch.boxName.toUpperCase()}</span>
                <span style={{ fontSize: 12, fontWeight: 700 }}>🥇 {gn(ch.winner)}</span>
                {ch.runner && <span style={{ fontSize: 11, color: P.dim }}>· 🥈 {gn(ch.runner)}</span>}
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
            {tabBtn("standings", "Standings")}
            {tabBtn("matches", "Match Log")}
            {tabBtn("players", "Players")}
          </div>

          {/* ── STANDINGS TAB ── */}
          {tab === "standings" && (
            <div>
              {(c.boxes || []).map((box, bi) => {
                const bm = (c.boxMatches || []).filter(m => m.box === bi);
                const bs = boxSt(box.players, bm);
                if (!bs.length) return null;
                return (
                  <div key={bi} style={{ marginBottom: 14 }}>
                    <p style={{ fontSize: 9, color: box.isSwing ? P.blue : P.orange, fontWeight: 700, letterSpacing: 2, marginBottom: 6 }}>{box.name.toUpperCase()}</p>
                    <div style={{ display: "flex", gap: 6, padding: "3px 0 5px", borderBottom: "1px solid rgba(21,152,203,.18)" }}>
                      <span style={{ width: 20 }} />
                      <span style={{ flex: 1, fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1 }}>PLAYER</span>
                      <span style={{ width: 24, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "center" }}>W</span>
                      <span style={{ width: 24, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "center" }}>L</span>
                      <span style={{ width: 34, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "right" }}>PTS</span>
                    </div>
                    {bs.map((s, ri) => (
                      <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid rgba(21,152,203,.04)", background: ri === 0 ? "rgba(255,184,0,.05)" : "transparent" }}>
                        <span style={{ width: 20, fontSize: 13 }}>{ri === 0 ? "🥇" : ri === 1 ? "🥈" : ri === 2 ? "🥉" : (ri + 1) + "."}</span>
                        <span style={{ flex: 1, fontSize: 12, fontWeight: ri === 0 ? 700 : 400 }}>{gn(s.id)}</span>
                        <span style={{ width: 24, fontSize: 11, color: P.ok, fontWeight: 600, textAlign: "center" }}>{s.w}</span>
                        <span style={{ width: 24, fontSize: 11, color: s.l > 0 ? P.bad : P.dim, textAlign: "center" }}>{s.l}</span>
                        <span style={{ width: 34, fontSize: 12, color: ri === 0 ? P.orange : P.grey, fontWeight: 700, textAlign: "right" }}>{s.pts}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
              {realWC.length > 0 && (
                <div style={{ marginBottom: 10 }}>
                  <p style={{ fontSize: 9, color: P.wc, fontWeight: 700, letterSpacing: 2, marginBottom: 6 }}>WILD CARDS</p>
                  {realWC.map(m => (
                    <div key={m.id} style={{ display: "flex", alignItems: "center", padding: "4px 0", borderBottom: "1px solid rgba(21,152,203,.04)", fontSize: 12, gap: 6 }}>
                      <span style={{ flex: 1, textAlign: "right", fontWeight: m.score1 > m.score2 ? 700 : 400 }}>{gn(m.player1)}</span>
                      <span style={{ color: P.wc, fontWeight: 700, width: 40, textAlign: "center" }}>{m.score1}–{m.score2}</span>
                      <span style={{ flex: 1, fontWeight: m.score2 > m.score1 ? 700 : 400 }}>{gn(m.player2)}</span>
                    </div>
                  ))}
                </div>
              )}
              {realOC.length > 0 && (
                <div style={{ marginBottom: 10 }}>
                  <p style={{ fontSize: 9, color: P.blue, fontWeight: 700, letterSpacing: 2, marginBottom: 6 }}>OPEN CHALLENGES</p>
                  {realOC.map(m => (
                    <div key={m.id} style={{ display: "flex", alignItems: "center", padding: "4px 0", borderBottom: "1px solid rgba(21,152,203,.04)", fontSize: 12, gap: 6 }}>
                      <span style={{ flex: 1, textAlign: "right", fontWeight: m.score1 > m.score2 ? 700 : 400 }}>{gn(m.player1)}</span>
                      <span style={{ color: P.blue, fontWeight: 700, width: 40, textAlign: "center" }}>{m.score1}–{m.score2}</span>
                      <span style={{ flex: 1, fontWeight: m.score2 > m.score1 ? 700 : 400 }}>{gn(m.player2)}</span>
                    </div>
                  ))}
                </div>
              )}
              {(c.bonuses || []).filter(b => b.pts > 0).length > 0 && (
                <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid rgba(21,152,203,.1)" }}>
                  <p style={{ fontSize: 9, color: P.amber, fontWeight: 700, letterSpacing: 2, marginBottom: 6 }}>BONUSES AWARDED</p>
                  {(c.bonuses || []).filter(b => b.pts > 0).map((b, i) => (
                    <div key={b.id + i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0", fontSize: 11 }}>
                      <span style={{ flex: 1 }}>{gn(b.id)}</span>
                      {editMode
                        ? <input type="number" min="0" max="5" defaultValue={b.pts} onBlur={e => saveBonusEdit(b.id, e.target.value)} style={{ width: 44, padding: "3px 6px", background: "rgba(0,20,40,.6)", border: "1px solid " + P.gb, borderRadius: 6, color: P.white, fontSize: 11, textAlign: "center" }} />
                        : <span style={{ fontWeight: 700, color: P.amber }}>+{b.pts}</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ── MATCH LOG TAB ── */}
          {tab === "matches" && (
            <div>
              <div style={{ display: "flex", gap: 4, padding: "4px 0 6px", borderBottom: "1px solid rgba(21,152,203,.2)" }}>
                <span style={{ width: 44, fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1 }}>TYPE</span>
                <span style={{ flex: 1, fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1 }}>WINNER</span>
                <span style={{ width: 42, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "center", letterSpacing: 1 }}>SCORE</span>
                <span style={{ flex: 1, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "right", letterSpacing: 1 }}>LOSER</span>
                <span style={{ width: 36, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "right", letterSpacing: 1 }}>DATE</span>
                {editMode && <span style={{ width: 24 }} />}
              </div>
              {allMatches.length === 0 && <p style={{ color: P.dim, fontSize: 12, textAlign: "center", padding: "16px 0" }}>No matches recorded</p>}
              {allMatches.map(m => {
                const w1 = m.score1 > m.score2;
                const winId = w1 ? m.player1 : m.player2;
                const losId = w1 ? m.player2 : m.player1;
                const ws = w1 ? m.score1 : m.score2;
                const ls = w1 ? m.score2 : m.score1;
                const typeColor = m._type === "Box" ? P.orange : m._type === "WC" ? P.wc : P.blue;
                const dateStr = m.completedAt ? m.completedAt.slice(5, 10).replace("-", "/") : "";
                if (editingId === m.id) return (
                  <div key={m.id} style={{ padding: "8px 0", borderBottom: "1px solid rgba(21,152,203,.08)" }}>
                    <div style={{ fontSize: 11, color: P.grey, marginBottom: 6 }}>{gn(m.player1)} vs {gn(m.player2)}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <input type="number" min="0" max="9" value={eS1} onChange={e => setES1(+e.target.value)} style={{ width: 48, padding: "5px", background: "rgba(0,20,40,.6)", border: "1px solid " + P.gb, borderRadius: 8, color: P.white, fontSize: 14, textAlign: "center" }} />
                      <span style={{ color: P.dim }}>–</span>
                      <input type="number" min="0" max="9" value={eS2} onChange={e => setES2(+e.target.value)} style={{ width: 48, padding: "5px", background: "rgba(0,20,40,.6)", border: "1px solid " + P.gb, borderRadius: 8, color: P.white, fontSize: 14, textAlign: "center" }} />
                      <button onClick={() => saveMatchEdit(m.id, eS1, eS2)} style={{ padding: "5px 12px", background: P.ok, border: "none", borderRadius: 8, color: "#000", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>Save</button>
                      <button onClick={() => setEditingId(null)} style={{ padding: "5px 10px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 8, color: P.dim, fontSize: 11, cursor: "pointer" }}>✕</button>
                    </div>
                  </div>
                );
                return (
                  <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 0", borderBottom: "1px solid rgba(21,152,203,.04)", fontSize: 11 }}>
                    <span style={{ width: 44, fontSize: 9, color: typeColor, fontWeight: 700, letterSpacing: 0.5 }}>{m._type === "Box" ? (m.boxName || "Box").toUpperCase() : m._type}</span>
                    <span style={{ flex: 1, fontWeight: 700 }}>{gn(winId)}</span>
                    <span style={{ width: 42, color: P.orange, fontWeight: 700, textAlign: "center" }}>{ws}–{ls}</span>
                    <span style={{ flex: 1, color: P.dim, textAlign: "right" }}>{gn(losId)}</span>
                    <span style={{ width: 36, fontSize: 9, color: P.dim, textAlign: "right" }}>{dateStr}</span>
                    {editMode && <button onClick={() => { setEditingId(m.id); setES1(m.score1); setES2(m.score2); }} style={{ width: 24, background: "transparent", border: "none", color: P.dim, fontSize: 13, cursor: "pointer", padding: 0 }}>✏</button>}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── PLAYERS TAB ── */}
          {tab === "players" && (
            <div>
              <div style={{ display: "flex", gap: 4, padding: "4px 0 6px", borderBottom: "1px solid rgba(21,152,203,.2)" }}>
                <span style={{ flex: 1, fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1 }}>PLAYER</span>
                <span style={{ width: 48, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "right", letterSpacing: 1 }}>MATCH</span>
                <span style={{ width: 48, fontSize: 9, color: P.dim, fontWeight: 700, textAlign: "right", letterSpacing: 1 }}>BONUS</span>
                <span style={{ width: 44, fontSize: 9, color: P.amber, fontWeight: 700, textAlign: "right", letterSpacing: 1 }}>TOTAL</span>
              </div>
              {playerList.map((p, i) => (
                <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 0", borderBottom: "1px solid rgba(21,152,203,.04)", fontSize: 11 }}>
                  <span style={{ flex: 1, fontWeight: i === 0 ? 700 : 400 }}>{gn(p.id)}</span>
                  <span style={{ width: 48, color: P.grey, textAlign: "right" }}>{p.matchPts}</span>
                  <span style={{ width: 48, color: p.bonusPts > 0 ? P.amber : P.dim, textAlign: "right" }}>{p.bonusPts > 0 ? "+" + p.bonusPts : "—"}</span>
                  <span style={{ width: 44, color: P.orange, fontWeight: 700, textAlign: "right" }}>{p.total}</span>
                </div>
              ))}
            </div>
          )}

          {/* ── Hidden Override Button ── */}
          <div style={{ marginTop: 18, textAlign: "right" }}>
            {!editMode && !editConfirm && (
              <button onClick={() => setEditConfirm(true)} style={{ background: "none", border: "none", color: "rgba(255,255,255,.12)", fontSize: 10, cursor: "pointer", letterSpacing: 1 }}>⚙ override</button>
            )}
            {editConfirm && !editMode && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8 }}>
                <span style={{ fontSize: 10, color: P.bad }}>Modifies historical data.</span>
                <button onClick={() => { setEditMode(true); setEditConfirm(false); setTab("matches"); }} style={{ padding: "4px 10px", background: "transparent", border: "1px solid " + P.bad, borderRadius: 7, color: P.bad, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Unlock</button>

            ) : (
              champ && <div style={{ flex: 1, minWidth: 100, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(241,138,0,.2)" }}>
                <p style={{ fontSize: 9, color: P.orange, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>🏆 CHAMPION</p>
                <p style={{ fontSize: 13, color: P.white, fontWeight: 600 }}>{gn(champ.id)}</p>
              </div>
            )}
            {topScorer && <div style={{ flex: 1, minWidth: 100, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(21,152,203,.2)" }}>
              <p style={{ fontSize: 9, color: P.blue, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>⭐ TOP SCORER</p>
              <p style={{ fontSize: 13, color: P.white, fontWeight: 600 }}>{gn(topScorer.id)} <span style={{ color: P.orange, fontSize: 11 }}>{topScorer.pts}pts</span></p>
            </div>}
            <div style={{ flex: 1, minWidth: 80, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(255,255,255,.08)" }}>
              <p style={{ fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>🎱 MATCHES</p>
              <p style={{ fontSize: 13, color: P.off, fontWeight: 600 }}>{totalPlayed}</p>
            </div>
            <div style={{ flex: 1, minWidth: 80, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(255,255,255,.08)" }}>
              <p style={{ fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>⚡ SHUTOUTS</p>
              <p style={{ fontSize: 13, color: P.off, fontWeight: 600 }}>{shutouts}</p>
            </div>
          </div>
        </div>
      );
    })()}

    {(st.pastCycles || []).length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>Past Rounds</h4>
        {[...(st.pastCycles || [])].reverse().map((c, revIdx) => {
          const cycleIdx = st.pastCycles.length - 1 - revIdx;
          const saveCycle = (idx, updated) => save(withLog({ ...st, pastCycles: st.pastCycles.map((x, i) => i === idx ? updated : x) }, "CYCLE_OVERRIDE", "Round " + updated.cycle));
          return <PastCycleRow key={c.cycle} c={c} gn={gn} cycleIdx={cycleIdx} saveCycle={saveCycle} />;
        })}
      </div>
    )}

    {(() => {
      const date = new Date().toISOString().slice(0, 10);
      const dl = (content, filename, type) => { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([content], { type })); a.download = filename; a.click(); URL.revokeObjectURL(a.href); };
      const exportJSON = () => dl(JSON.stringify(st, null, 2), `dra-pool-backup-${date}.json`, "application/json");
      const exportCSV = () => { const elo = calcElo(st.players, st); const rows = [["Rank","Name","Points","Box Pts","Open Pts","Wins","Losses","Racks Won","Racks Lost","ELO"]]; ladder.forEach((s, i) => rows.push([i+1, s.name, s.points, s.boxPts, s.openPts, s.wins, s.losses, s.rw, s.rl, elo.ratings[s.id] || 1000])); dl(rows.map(r => r.join(",")).join("\n"), `dra-pool-standings-${date}.csv`, "text/csv"); };
      return (
        <div style={gc}>
          <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 6 }}>Export Data</h4>
          <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>Download a backup in case of issues.</p>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={exportJSON} style={{ ...bpS, flex: 1, marginTop: 0 }}>JSON Backup</button>
            <button onClick={exportCSV} style={{ ...bpS, flex: 1, marginTop: 0, background: "linear-gradient(135deg," + P.blue + ",#0e7aad)" }}>Standings CSV</button>
          </div>
        </div>
      );
    })()}

    {pendingMatches.length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.amber, fontFamily: "Georgia,serif", marginBottom: 6 }}>Pending Matches ({pendingMatches.length})</h4>
        {daysInCycle > 0 && <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>Round in progress for {Math.floor(daysInCycle)} day{Math.floor(daysInCycle) !== 1 ? "s" : ""}. {daysInCycle >= 7 ? "These are overdue." : ""}</p>}
        {pendingMatches.map(m => (
          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ fontSize: 9, fontWeight: 700, color: daysInCycle >= 7 ? P.bad : P.amber, width: 52, letterSpacing: 1 }}>{m.label.toUpperCase()}</span>
            <span style={{ flex: 1, fontSize: 12 }}>{gn(m.player1)} <span style={{ color: P.dim }}>vs</span> {gn(m.player2)}</span>
            <button onClick={() => ffM(m.id, m.matchType === "Box" ? "boxMatches" : "wildCards")} style={{ padding: "4px 10px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 7, color: P.dim, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Forfeit</button>
          </div>
        ))}
      </div>
    )}

    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 8 }}>Admin PIN</h4>
      {!showPinChange ? (
        <button onClick={() => { setShowPinChange(true); setNewPinA(""); setNewPinB(""); setPinErr(""); }} style={{ ...bpS, background: "transparent", border: "1px solid " + P.dim, color: P.grey, marginTop: 0 }}>Change PIN</button>
      ) : (
        <div>
          <input type="password" inputMode="numeric" maxLength={4} value={newPinA} onChange={e => setNewPinA(e.target.value.replace(/\D/g, ""))} placeholder="New PIN (4 digits)" style={{ ...inpS, width: "100%", marginBottom: 8 }} />
          <input type="password" inputMode="numeric" maxLength={4} value={newPinB} onChange={e => setNewPinB(e.target.value.replace(/\D/g, ""))} placeholder="Confirm PIN" style={{ ...inpS, width: "100%", marginBottom: 8 }} />
          {pinErr && <p style={{ fontSize: 11, color: P.bad, marginBottom: 8 }}>{pinErr}</p>}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { if (newPinA.length !== 4) { setPinErr("PIN must be 4 digits."); return; } if (newPinA !== newPinB) { setPinErr("PINs don't match."); return; } save(withLog({ ...st, adminPin: newPinA }, "PIN_CHANGED", "Admin PIN updated")); setShowPinChange(false); setPinErr(""); }} style={{ ...bpS, marginTop: 0 }}>Save PIN</button>
            <button onClick={() => setShowPinChange(false)} style={bcS}>Cancel</button>
          </div>
        </div>
      )}
    </div>

    <div style={{ ...gc, borderColor: "rgba(248,113,113,.2)" }}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.bad, fontFamily: "Georgia,serif" }}>Danger Zone</h4>
      {cr ? <div><p style={{ fontSize: 11, color: P.bad, marginBottom: 8 }}>Delete ALL?</p><button onClick={() => { resetAll(); setCr(false); }} style={{ ...bpS, background: P.bad, color: "#fff" }}>Yes</button><button onClick={() => setCr(false)} style={bcS}>Cancel</button></div>
        : <button onClick={() => setCr(true)} style={{ ...bpS, background: "transparent", border: "1px solid " + P.bad, color: P.bad }}>Reset League</button>}</div>

    {(st.auditLog || []).length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>Audit Log</h4>
        <div style={{ maxHeight: 300, overflowY: "auto" }}>
          {[...(st.auditLog || [])].reverse().slice(0, 50).map(e => (
            <div key={e.id} style={{ padding: "6px 0", borderBottom: "1px solid rgba(21,152,203,.06)", display: "flex", gap: 8, alignItems: "baseline" }}>
              <span style={{ fontSize: 9, color: P.dim, whiteSpace: "nowrap" }}>{new Date(e.ts).toLocaleDateString()} {new Date(e.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
              <span style={{ fontSize: 10, color: P.blue, fontWeight: 700, whiteSpace: "nowrap" }}>{e.action}</span>
              {e.details && <span style={{ fontSize: 10, color: P.grey }}>{e.details}</span>}
            </div>
          ))}
        </div>
      </div>
    )}
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
