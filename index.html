function buildBoxes(ids, lad) {
  const rk = lad.filter(s => ids.includes(s.id)); const bx = []; let i = 0;
  while (i < rk.length) { const rem = rk.length - i;

  if (bx.length && !bx[bx.length - 1].isSwing) { bx[bx.length - 1].isSwing = true; bx[bx.length - 1].name = "Swing Box"; }
  return bx;
}

function genWC(boxes) { if (boxes.length < 2) return []; const wc = [], used = new Set(); const all = boxes.flatMap((b, bi) => b.players.map(p => ({ id: p, box: bi }))); const sh = shuf(all); for (const p of sh) { if (used.has(p.id)) continue; const c = sh.find(x => x.box !== p.box && !used.has(x.id)); if (!c) continue; used.add(p.id); used.add(c.id); wc.push({ id: uid(), type: "wildcard", player1: p.id, player2: c.id, score1: null, score2: null, completed: false, completedAt: null }); } return wc; }

function boxSt(pids, matches) {
  const s = {}; pids.forEach(id => { s[id] = { id, pts: 0, w: 0, l: 0, rw: 0, rl: 0 }; });
  matches.filter(m => m.completed).forEach(m => { if (!s[m.player1] || !s[m.player2]) return;
    if (m.forfeit || (m.score1 === 0 && m.score2 === 0)) return;
    s[m.player1].rw += m.score1; s[m.player1].rl += m.score2; s[m.player2].rw += m.score2; s[m.player2].rl += m.score1;
    if (m.score1 > m.score2) { s[m.player1].pts += m.score2 === 0 ? 5 : 4; s[m.player1].w++; s[m.player2].pts += m.score2 > 0 ? 2 : 0; s[m.player2].l++; }
    else { s[m.player2].pts += m.score1 === 0 ? 5 : 4; s[m.player2].w++; s[m.player1].pts += m.score1 > 0 ? 2 : 0; s[m.player1].l++; } });
  return Object.values(s).sort((a, b) => b.pts - a.pts || b.w - a.w || b.rw - a.rw);

function calcLad(players, st) {
  const s = {}; players.forEach(p => { s[p.id] = { id: p.id, name: p.name, points: 0, boxPts: 0, openPts: 0, wins: 0, losses: 0, rw: 0, rl: 0, mp: 0, last: p.joinedAt, inactive: false, streak: 0 }; });

  // Sort by completedAt for streak calc

      if (w1) { a.points += wp; a.boxPts += wp; a.wins++; b.points += lp; b.boxPts += lp; b.losses++; a.streak = a.streak > 0 ? a.streak + 1 : 1; b.streak = 0; }
      else { b.points += wp; b.boxPts += wp; b.wins++; a.points += lp; a.boxPts += lp; a.losses++; b.streak = b.streak > 0 ? b.streak + 1 : 1; a.streak = 0; } }

  (st.pastCycles || []).forEach(c => { (c.bonuses || []).forEach(b => { if (s[b.id] && b.pts > 0) s[b.id].boxPts += b.pts; }); });

}

// Head-to-head record between two players
function getH2H(p1, p2, st) {
  const all = [...(st.boxMatches || []), ...(st.wildCards || []), ...(st.openChallenges || [])];
  (st.pastCycles || []).forEach(c => { [...(c.boxMatches || []), ...(c.wildCards || []), ...(c.openChallenges || [])].forEach(m => all.push(m)); });
  let w1 = 0, w2 = 0;
  all.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)).forEach(m => {
    if (m.player1 === p1 && m.player2 === p2) { if (m.score1 > m.score2) w1++; else w2++; }
    else if (m.player1 === p2 && m.player2 === p1) { if (m.score1 > m.score2) w2++; else w1++; }
  });
  if (w1 === 0 && w2 === 0) return null;
  return { w1, w2 };
}

// Get monthly champions from past cycles (Box 1 winner)
function getChampions(st, gn) {
  const champs = [];
  (st.pastCycles || []).forEach(c => {
    if (c.boxes && c.boxes.length > 0 && !c.boxes[0].isSwing) {
      const box1 = c.boxes[0];
      const bm = (c.boxMatches || []).filter(m => m.box === 0);
      if (bm.length > 0 && bm.every(m => m.completed)) {
        const bs = boxSt(box1.players, bm);
        if (bs[0]) champs.push({ cycle: c.cycle, id: bs[0].id, name: gn(bs[0].id), date: c.startedAt });
      }
    }
  });
  // Check current cycle Box 1
  if (st.boxes && st.boxes.length > 0 && !st.boxes[0].isSwing) {
    const bm = (st.boxMatches || []).filter(m => m.box === 0);
    if (bm.length > 0 && bm.every(m => m.completed)) {

      if (bs[0]) champs.push({ cycle: st.cycleNumber, id: bs[0].id, name: gn(bs[0].id), date: st.cycleStart, current: true });
    }
  }
  return champs;
}

// Get current box winners for ALL boxes
function getBoxWinners(st, gn) {
  if (!st.boxes || !st.boxMatches) return [];
  const winners = [];
  st.boxes.forEach((box, bi) => {
    const bm = st.boxMatches.filter(m => m.box === bi);
    if (bm.length > 0 && bm.every(m => m.completed)) {

      if (bs[0]) winners.push({ box: box.name, id: bs[0].id, name: gn(bs[0].id), isBox1: bi === 0 && !box.isSwing });
    }
  });
  return winners;
}

// Rank changes: compare current ladder position to previous cycle's ladder
function getRankChanges(ladder, st, players) {
  if (!st.pastCycles || !st.pastCycles.length) return {};
  const prevSt = { ...st, boxMatches: [], wildCards: [], openChallenges: [], boxes: [], pastCycles: st.pastCycles.slice(0, -1) };
  // Add the second-to-last cycle's data
  const lastCyc = st.pastCycles[st.pastCycles.length - 1];
  if (lastCyc) { prevSt.boxMatches = lastCyc.boxMatches || []; prevSt.wildCards = lastCyc.wildCards || []; prevSt.openChallenges = lastCyc.openChallenges || []; prevSt.boxes = lastCyc.boxes || []; }
  const prevLad = calcLad(players, prevSt);
  const prevRank = {}; prevLad.forEach((s, i) => { prevRank[s.id] = i; });
  const changes = {};
  ladder.forEach((s, i) => {
    const prev = prevRank[s.id];
    if (prev === undefined) changes[s.id] = "new";
    else if (prev > i) changes[s.id] = prev - i;
    else if (prev < i) changes[s.id] = -(i - prev);
    else changes[s.id] = 0;
  });
  return changes;
}

    save(withLog({ ...st, pastCycles: past, boxes: [], boxMatches: [], wildCards: [], openChallenges: [] }, "CYCLE_COMPLETED", "Cycle " + st.cycleNumber));

  };
  const startCyc = () => {
    if (st.checkedIn.length < 4) { flash("Need 4+"); return; }
    let past = st.pastCycles;
    if (st.cycleNumber > 0 && (st.boxes || []).length > 0) {
      const bon = [];
      const afBM = (st.boxMatches || []).map(m => { if (!m.completed) { return { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true, autoForfeit: true }; } return m; });
      const afWC = (st.wildCards || []).map(m => { if (!m.completed) { return { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true, autoForfeit: true }; } return m; });
      if (st.boxes) st.boxes.forEach((box, bi) => { const bm = afBM.filter(m => m.box === bi); if (bm.length > 0 && bm.every(m => m.completed)) { const bs = boxSt(box.players, bm); if (bs[0]) bon.push({ id: bs[0].id, pts: 3 }); if (bs[1]) bon.push({ id: bs[1].id, pts: 1 }); } });
      past = [...st.pastCycles, { cycle: st.cycleNumber, boxMatches: afBM, wildCards: afWC, openChallenges: st.openChallenges, boxes: st.boxes, bonuses: [...bon], startedAt: st.cycleStart }];
    }
    const nl = calcLad(st.players, { ...st, pastCycles: past, boxMatches: [], wildCards: [], openChallenges: [], boxes: [] });
    const boxes = buildBoxes(st.checkedIn, nl); const bm = genBM(boxes); const wc = genWC(boxes);
    const ns = { ...st, pastCycles: past, boxes, boxMatches: bm, wildCards: wc, openChallenges: [], cycleStart: nw(), cycleNumber: st.cycleNumber + 1 };
    save(withLog(ns, "CYCLE_STARTED", "Cycle " + (st.cycleNumber + 1)));

  };
  const undoCyc = () => { if (st.cycleNumber < 1) return; const prev = st.pastCycles[st.pastCycles.length - 1]; const restore = arr => (arr || []).map(m => m.autoForfeit ? { ...m, score1: null, score2: null, completed: false, completedAt: null, forfeit: false, autoForfeit: false } : m); const base = prev ? { ...st, pastCycles: st.pastCycles.slice(0, -1), boxes: prev.boxes || [], boxMatches: restore(prev.boxMatches), wildCards: restore(prev.wildCards), openChallenges: prev.openChallenges || [], cycleStart: prev.startedAt, cycleNumber: st.cycleNumber - 1 } : { ...st, boxes: [], boxMatches: [], wildCards: [], openChallenges: [], cycleStart: null, cycleNumber: 0 }; save(withLog(base, "CYCLE_UNDONE", "Cycle " + st.cycleNumber)); flash("Undone!"); };
  const logR = (id, s1, s2, list) => { const m = st[list].find(x => x.id === id); const det = m ? gn(m.player1) + " " + s1 + "-" + s2 + " " + gn(m.player2) : id; save(withLog({ ...st, [list]: st[list].map(m => m.id === id ? { ...m, score1: s1, score2: s2, completed: true, completedAt: nw(), forfeit: false } : m) }, "MATCH_RECORDED", det)); flash("Recorded!"); };
  const ffM = (id, list) => { const m = st[list].find(x => x.id === id); const det = m ? gn(m.player1) + " vs " + gn(m.player2) : id; save(withLog({ ...st, [list]: st[list].map(m => m.id === id ? { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true } : m) }, "MATCH_FORFEIT", det)); flash("Match marked not played"); };
  const newOC = (p1, p2) => { if (p1 === p2) { flash("Same player!"); return; } const oc = { id: uid(), type: "open", player1: p1, player2: p2, score1: null, score2: null, completed: false, completedAt: null }; save(withLog({ ...st, openChallenges: [...st.openChallenges, oc] }, "CHALLENGE_CREATED", gn(p1) + " vs " + gn(p2))); flash("Challenge created!"); };
  const resetAll = () => { save(DEF); flash("Reset!"); setView("home"); };

  const tabs = [["home", "\ud83c\udfc6"], ["boxes", "\ud83d\udcca"], ["matches", "\ud83c\udfb1"], ["challenge", "\u2694\ufe0f"], ["checkin", "\u2705"], ["admin", "\ud83d\udd12"]];

  return (

        @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

// ─── HOME ────────────────────────────────────────────────────
function Home({ st, ladder, gn, ini, cd }) {

  const [showChampHistory, setShowChampHistory] = useState(false);

  const last5 = (st.openChallenges || []).filter(m => m.completed).slice(-5).reverse();
  const getS = (bm, p1, p2) => { const m = bm.find(m => (m.player1 === p1 && m.player2 === p2) || (m.player1 === p2 && m.player2 === p1)); if (!m) return null; if (!m.completed) return { pending: true }; return { s1: m.player1 === p1 ? m.score1 : m.score2, s2: m.player1 === p1 ? m.score2 : m.score1 }; };

  // Last completed cycle champions (all box winners)
  const lastCyc = st.pastCycles && st.pastCycles.length ? st.pastCycles[st.pastCycles.length - 1] : null;
  const lastChamps = lastCyc
    ? (lastCyc.boxes || []).map((box, bi) => { const bm = (lastCyc.boxMatches || []).filter(m => m.box === bi); const bs = boxSt(box.players, bm); return bs[0] ? { box: box.name, name: gn(bs[0].id), isSwing: box.isSwing } : null; }).filter(Boolean)
    : [];

  // Cycle progress summary
  const boxSummaries = (st.boxes || []).map((box, bi) => {
    const bm = (st.boxMatches || []).filter(m => m.box === bi);
    const done = bm.filter(m => m.completed && !m.forfeit).length;
    const total = bm.length;
    const bs = boxSt(box.players, bm);
    const complete = total > 0 && bm.every(m => m.completed);
    return { box, bi, done, total, bs, complete };
  });
  const totalDone = (st.boxMatches || []).filter(m => m.completed && !m.forfeit).length + (st.wildCards || []).filter(m => m.completed && !m.forfeit).length;
  const totalPend = (st.boxMatches || []).filter(m => !m.completed).length + (st.wildCards || []).filter(m => !m.completed).length;

      {st.cycleNumber > 0 && boxSummaries.length > 0 && (
        <div style={{ ...gc, padding: "12px 16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <p style={{ fontSize: 9, color: P.blue, letterSpacing: 3, fontWeight: 700 }}>CYCLE {st.cycleNumber} PROGRESS</p>
            <span style={{ fontSize: 10, color: P.dim }}>{totalDone} played · {totalPend} pending</span>

            </div>
            {displayLad.map((s, i) => (
              <div key={s.id}>
                <div onClick={() => setExp(exp === s.id ? null : s.id)} style={{ display: "flex", padding: "9px 10px", gap: 4, borderBottom: exp === s.id ? "none" : "1px solid rgba(21,152,203,.08)", background: i === 0 ? "rgba(241,138,0,.12)" : i % 2 === 0 ? "rgba(0,48,79,.2)" : "transparent", borderLeft: i === 0 ? "3px solid " + P.orange : "3px solid transparent", cursor: "pointer" }}>
                  <span style={{ width: 22, fontWeight: 700, fontSize: 12, color: i === 0 ? P.orange : i < 3 ? P.blue : P.dim }}>{i === 0 ? "\ud83d\udc51" : i + 1}</span>

// ─── BOXES ───────────────────────────────────────────────────

  const getS = (bm, p1, p2) => { const m = bm.find(m => (m.player1 === p1 && m.player2 === p2) || (m.player1 === p2 && m.player2 === p1)); if (!m) return null; if (!m.completed) return { pending: true }; return { s1: m.player1 === p1 ? m.score1 : m.score2, s2: m.player1 === p1 ? m.score2 : m.score1 }; };

              <tbody>{pids.map((pid, ri) => (<tr key={pid}><td style={{ ...gtd, textAlign: "left", fontWeight: 600, fontSize: 12 }}>{gn(pid)}</td><td style={{ ...gtd, fontWeight: 700, color: P.orange }}>{bs[ri] ? bs[ri].pts : 0}</td>
                {pids.map(oid => { if (pid === oid) return <td key={oid} style={{ ...gtd, background: "rgba(0,48,82,.4)" }} />; const sc = getS(bm, pid, oid); if (!sc) return <td key={oid} style={{ ...gtd, color: P.dim }}>{"—"}</td>; if (sc.pending) return <td key={oid} style={{ ...gtd, background: "rgba(241,138,0,.12)" }}><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: P.orange, animation: "pulse 1.8s infinite" }} /></td>; if (sc.s1 === 0 && sc.s2 === 0) return <td key={oid} style={{ ...gtd, color: P.dim, fontSize: 10, fontStyle: "italic" }}>FF</td>; const w = sc.s1 > sc.s2; return <td key={oid} style={{ ...gtd, fontWeight: 700, color: w ? P.ok : P.bad, background: w ? "rgba(52,211,153,.08)" : "rgba(248,113,113,.06)" }}>{sc.s1}-{sc.s2}</td>; })}
              </tr>))}</tbody></table></div></div>}
            {!isCol && done && <div style={{ display: "flex", gap: 12, marginTop: 6 }}><span style={{ fontSize: 10, color: P.orange }}>{"\ud83e\udd47"} {gn(bs[0] ? bs[0].id : "")} (+3)</span>{bs[1] && <span style={{ fontSize: 10, color: P.grey }}>{"\ud83e\udd48"} {gn(bs[1].id)} (+1)</span>}</div>}
          </div>); })}

// ─── MATCHES (with H2H) ─────────────────────────────────────
function MatchesV({ st, gn, logR, ffM }) {
  const [sc, setSc] = useState(null); const [s1, setS1] = useState(2); const [s2, setS2] = useState(0);
  if (!st.cycleNumber) return <div style={{ textAlign: "center", padding: 50 }}><p style={{ fontSize: 44 }}>{"\ud83d\udcc5"}</p><p style={{ color: P.grey }}>No active cycle.</p></div>;
  const valid = (s1 === 2 && s2 < 2) || (s2 === 2 && s1 < 2);
  const sub = (id, list) => { if (valid) { logR(id, s1, s2, list); setSc(null); setS1(2); setS2(0); } };
  const rm = (m, list, label, color) => {
    const h2h = getH2H(m.player1, m.player2, st);
    return (
    <div key={m.id} style={{ ...gc, opacity: m.completed && sc !== m.id ? .5 : 1 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
        <span style={{ fontSize: 8, fontWeight: 700, color, letterSpacing: 3 }}>{label}{m.boxName ? " — " + m.boxName : ""}</span>
        {h2h && <span style={{ fontSize: 9, color: P.dim }}>H2H: {gn(m.player1).split(" ")[0]} {h2h.w1}-{h2h.w2} {gn(m.player2).split(" ")[0]}</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ flex: 1, fontSize: 14, fontWeight: 600 }}>{gn(m.player1)}</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: m.completed ? (m.forfeit ? P.dim : P.orange) : P.dim, padding: "0 10px" }}>{m.completed ? (m.forfeit ? "—" : m.score1 + " – " + m.score2) : "vs"}</span>
        <span style={{ flex: 1, fontSize: 14, fontWeight: 600, textAlign: "right" }}>{gn(m.player2)}</span>
      </div>
      {m.completed && m.forfeit && <div style={{ fontSize: 11, color: P.dim, marginTop: 5, fontStyle: "italic" }}>Not played</div>}
      {m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0) && <div style={{ fontSize: 11, color: P.ok, marginTop: 5 }}>{m.score1 > m.score2 ? gn(m.player1) : gn(m.player2)} wins</div>}
      {m.completed && sc !== m.id && <button onClick={() => { setSc(m.id); setS1(m.score1); setS2(m.score2); }} style={{ marginTop: 6, padding: "5px 12px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 8, color: P.dim, fontWeight: 600, fontSize: 10, cursor: "pointer" }}>Edit Score</button>}
      {!m.completed && sc !== m.id && <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <button onClick={() => { setSc(m.id); setS1(2); setS2(0); }} style={{ ...bpS, width: "auto", display: "inline-block", padding: "8px 18px", marginTop: 0 }}>Log Score</button>
        <button onClick={() => ffM(m.id, list)} style={{ padding: "8px 18px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 10, color: P.dim, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Forfeit</button>
      </div>}
      {sc === m.id && <div style={{ marginTop: 12, padding: 14, background: "rgba(0,20,40,.6)", borderRadius: 12, border: "1px solid " + P.gb }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
          {["player1", "player2"].map((k, idx) => { const val = idx === 0 ? s1 : s2, sv = idx === 0 ? setS1 : setS2, ov = idx === 0 ? s2 : s1, so = idx === 0 ? setS2 : setS1; return (
            <div key={k} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: P.grey }}>{gn(m[k])}</span>
              <div style={{ display: "flex", gap: 4 }}>{[0, 1, 2].map(v => <button key={v} onClick={() => { sv(v); if (v === 2 && ov === 2) so(1); }} style={{ width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 10, background: val === v ? "linear-gradient(135deg," + P.orange + "," + P.amber + ")" : P.glass, border: "1px solid " + (val === v ? P.orange : P.gb), color: val === v ? P.navy : P.grey, fontSize: 16, fontWeight: 700, cursor: "pointer", transform: val === v ? "scale(1.08)" : "scale(1)" }}>{v}</button>)}</div>
            </div>); })}
        </div>
        {valid ? <button onClick={() => sub(m.id, list)} style={bpS}>Confirm {s1} – {s2}</button> : <p style={{ fontSize: 10, color: P.dim, textAlign: "center", marginTop: 8 }}>One player must win 2</p>}
        <button onClick={() => setSc(null)} style={bcS}>Cancel</button>
      </div>}
    </div>);
  };
  const [col, setCol] = useState({ done: true });
  const togCol = (k) => setCol(c => ({ ...c, [k]: !c[k] }));
  const SecHdr = ({ k, label }) => (
    <div onClick={() => togCol(k)} style={{ display: "flex", alignItems: "center", cursor: "pointer", userSelect: "none", margin: "18px 0 8px" }}>
      <span style={{ fontSize: 9, fontWeight: 700, color: P.orange, letterSpacing: 3, textTransform: "uppercase" }}>{label}</span>
      <span style={{ marginLeft: 8, fontSize: 10, color: P.dim }}>{col[k] ? "▶" : "▼"}</span>

  const wP = (st.wildCards || []).filter(m => !m.completed), wD = (st.wildCards || []).filter(m => m.completed);
  const oP = (st.openChallenges || []).filter(m => !m.completed), oD = (st.openChallenges || []).filter(m => m.completed);
  return (<div style={{ paddingTop: 16 }}><Tt>Cycle {st.cycleNumber} Matches</Tt>
    {bP.length > 0 && <div><SecHdr k="bp" label={"Box — Pending (" + bP.length + ")"} />{!col["bp"] && bP.map(m => rm(m, "boxMatches", "BOX", P.orange))}</div>}
    {wP.length > 0 && <div><SecHdr k="wp" label={"Wild Cards — Pending (" + wP.length + ")"} />{!col["wp"] && wP.map(m => rm(m, "wildCards", "WILD CARD", "#C4A1FF"))}</div>}
    {oP.length > 0 && <div><SecHdr k="op" label={"Open — Pending (" + oP.length + ")"} />{!col["op"] && oP.map(m => rm(m, "openChallenges", "OPEN", P.blue))}</div>}
    {(bD.length + wD.length + oD.length > 0) && <div><SecHdr k="done" label={"Completed (" + (bD.length + wD.length + oD.length) + ")"} />{!col["done"] && <div>{bD.map(m => rm(m, "boxMatches", "BOX", P.orange))}{wD.map(m => rm(m, "wildCards", "WILD CARD", "#C4A1FF"))}{oD.map(m => rm(m, "openChallenges", "OPEN", P.blue))}</div>}</div>}
  </div>);
}

// ─── CHECK IN ───────────────────────────────────────────────
function CheckInV({ st, ladder, togCI }) {
  const [search, setSearch] = useState("");
  const [showSignUp, setShowSignUp] = useState(true);
  const [showRemaining, setShowRemaining] = useState(false);
  // Playing This Period — players in the current active cycle
  const currentIds = new Set((st.boxes || []).flatMap(b => b.players));
  const currentPlayers = ladder.filter(s => currentIds.has(s.id));

  // Sign Up for Next Period
  const playing = ladder.filter(s => st.checkedIn.includes(s.id));
  const notPlaying = ladder.filter(s => !st.checkedIn.includes(s.id));
  const lastBoxes = st.boxes.length > 0 ? st.boxes : (st.pastCycles.length ? st.pastCycles[st.pastCycles.length - 1]?.boxes || [] : []);
  const lastCycleIds = new Set(lastBoxes.flatMap(b => b.players));
  const hasPrevCycle = lastBoxes.length > 0;
  const newSignups = hasPrevCycle ? playing.filter(s => !lastCycleIds.has(s.id)) : [];
  const returning = hasPrevCycle ? playing.filter(s => lastCycleIds.has(s.id)) : playing;
  const filtered = search.trim() ? notPlaying.filter(s => s.name.toLowerCase().includes(search.toLowerCase())) : notPlaying;

  const secBtn = (label, show, onToggle, count) => (
    <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0 6px", cursor: "pointer", userSelect: "none" }}>
      <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 2, color: P.dim }}>{show ? "\u25bc" : "\u25b6"}</span>
      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: P.dim, textTransform: "uppercase" }}>{label}</span>
      {count !== undefined && <span style={{ fontSize: 10, color: P.grey }}>({count})</span>}
      <div style={{ flex: 1, height: 1, background: P.gb }} />
    </div>
  );

  const playerRow = (s, action, actionLabel, actionStyle, badge) => (
    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
      {badge && <span style={{ fontSize: 8, fontWeight: 700, color: P.orange, background: "rgba(241,138,0,.15)", border: "1px solid rgba(241,138,0,.3)", borderRadius: 4, padding: "1px 5px", letterSpacing: 1 }}>NEW</span>}
      <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
      {action && <button onClick={() => action(s.id)} style={actionStyle}>{actionLabel}</button>}
    </div>
  );

  const leaveBtn = { padding: "4px 12px", background: "transparent", border: "1px solid " + P.bad, borderRadius: 8, color: P.bad, fontSize: 10, fontWeight: 700, cursor: "pointer" };
  const joinBtn = { padding: "4px 12px", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", border: "none", borderRadius: 8, color: P.navy, fontSize: 10, fontWeight: 700, cursor: "pointer" };

  return (<div style={{ paddingTop: 16 }}>
    <Tt>Players</Tt>
    <p style={{ fontSize: 12, color: P.grey, marginBottom: 10 }}>{st.checkedIn.length} of {st.players.length} signed up for next period</p>

    {/* Playing This Period — read-only */}
    {st.cycleNumber > 0 && currentPlayers.length > 0 && (<>
      {secBtn("Playing This Period", true, () => {}, currentPlayers.length)}
      <div style={gc}>
        {currentPlayers.map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
            <span style={{ fontSize: 9, color: P.dim }}>active</span>
          </div>
        ))}
      </div>
    </>)}

    {/* Sign Up for Next Period */}
    {secBtn("Sign Up for Next Period", showSignUp, () => setShowSignUp(v => !v), playing.length)}
    {showSignUp && (
      <div style={gc}>
        {playing.length === 0 && <p style={{ fontSize: 12, color: P.dim, textAlign: "center", padding: "8px 0" }}>No one signed up yet.</p>}
        {newSignups.map(s => playerRow(s, togCI, "Leave", leaveBtn, true))}
        {returning.map(s => playerRow(s, togCI, "Leave", leaveBtn, false))}

        {/* Remaining — collapsed */}
        <div onClick={() => setShowRemaining(v => !v)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0 6px", cursor: "pointer", userSelect: "none", marginTop: 4, borderTop: "1px solid rgba(21,152,203,.08)" }}>
          <span style={{ fontSize: 9, color: P.dim }}>{showRemaining ? "\u25bc" : "\u25b6"}</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: P.dim, letterSpacing: 1 }}>NOT SIGNED UP ({notPlaying.length})</span>
        </div>
        {showRemaining && (<>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ ...inpS, width: "100%", marginBottom: 8, flex: "none", fontSize: 12 }} />
          {filtered.map(s => playerRow(s, togCI, "Join", joinBtn, false))}
          {filtered.length === 0 && search && <p style={{ color: P.dim, fontSize: 12, padding: "8px 0", textAlign: "center" }}>No matches for "{search}"</p>}
          {filtered.length === 0 && !search && <p style={{ fontSize: 12, color: P.dim, textAlign: "center", padding: "8px 0" }}>Everyone is already signed up!</p>}
        </>)}
      </div>
    )}
  </div>);
}

// ─── ADMIN ───────────────────────────────────────────────────

                    <span style={{ fontSize: 10, color: P.grey }}>{s.w}W {s.l}L</span>

                  </div>

              </div>

          })}
          {(c.wildCards || []).filter(m => m.completed && !m.forfeit).length > 0 && (
            <div style={{ marginBottom: 8 }}>
              <p style={{ fontSize: 9, color: "#C4A1FF", fontWeight: 700, letterSpacing: 2, marginBottom: 4 }}>WILD CARDS</p>
              {(c.wildCards || []).filter(m => m.completed && !m.forfeit).map(m => (
                <div key={m.id} style={{ display: "flex", alignItems: "center", padding: "4px 0", borderBottom: "1px solid rgba(21,152,203,.04)", fontSize: 12, gap: 6 }}>
                  <span style={{ flex: 1, textAlign: "right" }}>{gn(m.player1)}</span>
                  <span style={{ color: P.orange, fontWeight: 700, width: 40, textAlign: "center" }}>{m.score1}–{m.score2}</span>
                  <span style={{ flex: 1 }}>{gn(m.player2)}</span>
                </div>
              ))}
            </div>
          )}
          {(c.openChallenges || []).filter(m => m.completed).length > 0 && (
            <div>
              <p style={{ fontSize: 9, color: P.blue, fontWeight: 700, letterSpacing: 2, marginBottom: 4 }}>OPEN CHALLENGES</p>
              {(c.openChallenges || []).filter(m => m.completed).map(m => (
                <div key={m.id} style={{ display: "flex", alignItems: "center", padding: "4px 0", borderBottom: "1px solid rgba(21,152,203,.04)", fontSize: 12, gap: 6 }}>
                  <span style={{ flex: 1, textAlign: "right" }}>{gn(m.player1)}</span>
                  <span style={{ color: P.blue, fontWeight: 700, width: 40, textAlign: "center" }}>{m.score1}–{m.score2}</span>
                  <span style={{ flex: 1 }}>{gn(m.player2)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function AdminV({ st, ladder, startCyc, completeCyc, undoCyc, resetAll, addP, rmP, ffM, gn, save }) {
  const [pin, setPin] = useState(""); const [ok, setOk] = useState(false); const [err, setErr] = useState(false);
  const [cc, setCc] = useState(false); const [cr, setCr] = useState(false); const [cu, setCu] = useState(false);
  const [nm, setNm] = useState(""); const [rmId, setRmId] = useState(null); const [search, setSearch] = useState("");
  const [showPlayers, setShowPlayers] = useState(true);
  const daysInCycle = st.cycleStart ? dd(nw(), st.cycleStart) : 0;
  const overdueMatches = daysInCycle >= 7 ? [
    ...(st.boxMatches || []).filter(m => !m.completed).map(m => ({ ...m, matchType: "Box", label: m.boxName || "Box" })),
    ...(st.wildCards || []).filter(m => !m.completed).map(m => ({ ...m, matchType: "Wild Card", label: "Wild Card" })),
    ...(st.openChallenges || []).filter(m => !m.completed).map(m => ({ ...m, matchType: "Open", label: "Open" })),
  ] : [];
  const chk = () => { if (pin === "5755") { setOk(true); setErr(false); } else { setErr(true); setPin(""); } };
  const pend = ((st.boxMatches || []).filter(m => !m.completed).length) + ((st.wildCards || []).filter(m => !m.completed).length);
  const tot = [...(st.boxMatches || []), ...(st.wildCards || []), ...(st.openChallenges || [])].filter(m => m.completed).length + (st.pastCycles || []).reduce((a, c) => [...(c.boxMatches || []), ...(c.wildCards || []), ...(c.openChallenges || [])].filter(m => m.completed).length + a, 0);
  const filtLad = search.trim() ? ladder.filter(s => s.name.toLowerCase().includes(search.toLowerCase())) : ladder;

  if (!ok) return (<div style={{ paddingTop: 16 }}><Tt>Admin</Tt>
    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 10, fontFamily: "Georgia,serif" }}>Enter PIN</h4>
      <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, ""))} onKeyDown={e => { if (e.key === "Enter") chk(); }} placeholder="· · · ·" style={{ ...inpS, width: "100%", textAlign: "center", fontSize: 28, letterSpacing: 12, marginBottom: 10 }} />
      <button onClick={chk} style={{ ...bpS, marginTop: 0 }}>Unlock</button>
      {err && <p style={{ fontSize: 11, color: P.bad, marginTop: 8, textAlign: "center" }}>Wrong PIN.</p>}</div>
    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 10, fontFamily: "Georgia,serif" }}>Stats</h4>
      <div style={{ display: "flex", gap: 8 }}>{[[st.players.length, "Players"], [st.cycleNumber, "Cycles"], [tot, "Matches"]].map(([n, l]) => (<div key={l} style={{ flex: 1, background: "rgba(0,20,40,.5)", borderRadius: 10, padding: "14px 6px", textAlign: "center", border: "1px solid " + P.gb }}><div style={{ fontSize: 26, fontWeight: 300, color: P.orange, fontFamily: "Georgia,serif" }}>{n}</div><div style={{ fontSize: 9, color: P.dim, letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>{l}</div></div>))}</div></div>
  </div>);

  return (<div style={{ paddingTop: 16 }}><Tt>Admin <span style={{ fontSize: 11, color: P.ok }}>{"\ud83d\udd13"}</span></Tt>
    <div style={gc}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showPlayers ? 8 : 0 }}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif" }}>Players ({st.players.length})</h4>
        <button onClick={() => setShowPlayers(v => !v)} style={{ background: "none", border: "none", color: P.dim, fontSize: 14, cursor: "pointer" }}>{showPlayers ? "\u25bc" : "\u25b6"}</button>
      </div>
      {showPlayers && <div>
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}><input value={nm} onChange={e => setNm(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && nm.trim()) { addP(nm); setNm(""); } }} placeholder="New player..." style={inpS} /><button onClick={() => { if (nm.trim()) { addP(nm); setNm(""); } }} style={{ padding: "10px 18px", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", color: P.navy, border: "none", borderRadius: 10, fontWeight: 700, cursor: "pointer" }}>Add</button></div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ ...inpS, width: "100%", marginBottom: 8, flex: "none", fontSize: 12 }} />
        <div style={{ maxHeight: 250, overflowY: "auto" }}>{filtLad.map((s, i) => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ fontSize: 11, color: P.orange, fontWeight: 700, width: 24 }}>#{ladder.indexOf(s) + 1}</span>
            <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
            <span style={{ fontSize: 10, color: P.dim }}>{s.points}pts</span>
            {rmId === s.id ? (<div style={{ display: "flex", gap: 3 }}><button onClick={() => { rmP(s.id); setRmId(null); }} style={{ padding: "3px 8px", background: P.bad, color: "#fff", border: "none", borderRadius: 6, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Remove</button><button onClick={() => setRmId(null)} style={{ padding: "3px 8px", background: P.mid, color: P.grey, border: "none", borderRadius: 6, fontSize: 10, cursor: "pointer" }}>Keep</button></div>) : <button onClick={() => setRmId(s.id)} style={{ background: "transparent", border: "none", color: P.dim, fontSize: 16, cursor: "pointer" }}>{"\u00d7"}</button>}
          </div>))}</div>
      </div>}
    </div>

    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Cycle Duration</h4>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <input type="number" min="1" max="12" value={st.cycleDurationWeeks || 4} onChange={e => save({ ...st, cycleDurationWeeks: Math.max(1, Math.min(12, +e.target.value || 1)) })} style={{ ...ssS, width: 70, marginBottom: 0, textAlign: "center" }} />
        <span style={{ fontSize: 12, color: P.grey }}>weeks per cycle</span>
      </div>
    </div>

    {(() => {
      const allDone = st.cycleNumber > 0 && (st.boxes||[]).length > 0 && (st.boxMatches||[]).every(m => m.completed) && (st.wildCards||[]).every(m => m.completed);
      const cycleComplete = st.cycleNumber > 0 && (st.boxes||[]).length === 0;
      return (
        <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Cycles</h4>
          <p style={{ fontSize: 12, color: P.grey, marginBottom: 10 }}>
            {!st.cycleNumber ? "No active cycle." : cycleComplete ? "Cycle " + st.cycleNumber + " complete. Ready for next." : "Cycle " + st.cycleNumber + ". " + pend + " pending. " + st.checkedIn.length + " checked in."}
          </p>
          {allDone && (
            <div style={{ background: "rgba(52,211,153,.08)", border: "1px solid rgba(52,211,153,.25)", borderRadius: 12, padding: "10px 14px", marginBottom: 8 }}>
              <p style={{ fontSize: 12, color: P.ok, fontWeight: 700, marginBottom: 6 }}>✓ All matches complete</p>
              <button onClick={() => completeCyc()} style={{ ...bpS, background: "linear-gradient(135deg,#34D399,#059669)", marginTop: 0 }}>Complete Cycle {st.cycleNumber}</button>
            </div>
          )}
          {!allDone && !cycleComplete && (
            st.checkedIn.length < 4 ? <p style={{ fontSize: 11, color: P.bad }}>Need 4+ ({st.checkedIn.length})</p>
            : cc ? <div>{pend > 0 && <p style={{ fontSize: 11, color: P.bad, marginBottom: 6 }}>{pend} pending — will auto-forfeit</p>}<button onClick={() => { startCyc(); setCc(false); }} style={bpS}>Start Cycle {st.cycleNumber + 1}</button><button onClick={() => setCc(false)} style={bcS}>Cancel</button></div>
            : <button onClick={() => setCc(true)} style={bpS}>Start Cycle {st.cycleNumber + 1}</button>
          )}
          {cycleComplete && (
            st.checkedIn.length < 4 ? <p style={{ fontSize: 11, color: P.bad }}>Need 4+ to start ({st.checkedIn.length} checked in)</p>
            : cc ? <div><button onClick={() => { startCyc(); setCc(false); }} style={bpS}>Start Cycle {st.cycleNumber + 1}</button><button onClick={() => setCc(false)} style={bcS}>Cancel</button></div>
            : <button onClick={() => setCc(true)} style={bpS}>Start Cycle {st.cycleNumber + 1}</button>
          )}
        </div>
      );
    })()}

    {st.cycleNumber > 0 && (st.boxes||[]).length > 0 && <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Undo</h4>
      {cu ? <div><p style={{ fontSize: 11, color: P.bad, marginBottom: 6 }}>Delete Cycle {st.cycleNumber}?</p><button onClick={() => { undoCyc(); setCu(false); }} style={{ ...bpS, background: P.amber, color: P.navy }}>Yes</button><button onClick={() => setCu(false)} style={bcS}>Cancel</button></div>
        : <button onClick={() => setCu(true)} style={{ ...bpS, background: "transparent", border: "1px solid " + P.amber, color: P.amber }}>Undo Cycle {st.cycleNumber}</button>}</div>}

    {(st.pastCycles || []).length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>Past Cycles</h4>
        {[...(st.pastCycles || [])].reverse().map(c => <PastCycleRow key={c.cycle} c={c} gn={gn} />)}
      </div>
    )}

    {overdueMatches.length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.amber, fontFamily: "Georgia,serif", marginBottom: 10 }}>Match Reminders ({overdueMatches.length})</h4>
        <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>These matches have been pending for {Math.floor(daysInCycle)} days.</p>
        {overdueMatches.map(m => (
          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ fontSize: 9, fontWeight: 700, color: P.amber, width: 52, letterSpacing: 1 }}>{m.label.toUpperCase()}</span>
            <span style={{ flex: 1, fontSize: 12 }}>{gn(m.player1)} <span style={{ color: P.dim }}>vs</span> {gn(m.player2)}</span>
            <button onClick={() => ffM(m.id, m.matchType === "Box" ? "boxMatches" : m.matchType === "Wild Card" ? "wildCards" : "openChallenges")} style={{ padding: "4px 10px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 7, color: P.dim, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Forfeit</button>
          </div>
        ))}
      </div>
    )}

    <div style={{ ...gc, borderColor: "rgba(248,113,113,.2)" }}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.bad, fontFamily: "Georgia,serif" }}>Danger Zone</h4>
      {cr ? <div><p style={{ fontSize: 11, color: P.bad, marginBottom: 8 }}>Delete ALL?</p><button onClick={() => { resetAll(); setCr(false); }} style={{ ...bpS, background: P.bad, color: "#fff" }}>Yes</button><button onClick={() => setCr(false)} style={bcS}>Cancel</button></div>
        : <button onClick={() => setCr(true)} style={{ ...bpS, background: "transparent", border: "1px solid " + P.bad, color: P.bad }}>Reset League</button>}</div>

    {(st.auditLog || []).length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>Audit Log</h4>
        <div style={{ maxHeight: 300, overflowY: "auto" }}>
          {[...(st.auditLog || [])].reverse().slice(0, 50).map(e => (
            <div key={e.id} style={{ padding: "6px 0", borderBottom: "1px solid rgba(21,152,203,.06)", display: "flex", gap: 8, alignItems: "baseline" }}>
              <span style={{ fontSize: 9, color: P.dim, whiteSpace: "nowrap" }}>{new Date(e.ts).toLocaleDateString()} {new Date(e.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
              <span style={{ fontSize: 10, color: P.blue, fontWeight: 700, whiteSpace: "nowrap" }}>{e.action}</span>
              {e.details && <span style={{ fontSize: 10, color: P.grey }}>{e.details}</span>}
            </div>
          ))}
        </div>
      </div>
    )}
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
